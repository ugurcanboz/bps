<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Phase 38D.1 · B2 Prüfungsarchitektur Test</title><style>body{font-family:Arial,sans-serif;margin:24px;background:#f7f9fc;color:#14213d}.card{background:white;border:1px solid #d8e1ef;border-radius:16px;padding:18px;margin:12px 0}.ok{color:#137333}.bad{color:#b00020}button{padding:10px 14px;border-radius:10px;border:1px solid #0b57d0;background:#0b57d0;color:white}pre{white-space:pre-wrap;background:#eef3fb;padding:12px;border-radius:12px}</style></head><body><h1>Phase 38D.1 · B2 Prüfungsarchitektur</h1><div class="card"><button onclick="run()">Diagnose starten</button><pre id="out">Bereit.</pre></div><script src="./data/language-exam-blueprints.js"></script><script src="./data/language-b1-exam-pilot.js"></script><script src="./data/language-b2-exam-pilot.js"></script><script src="./js/modules/language-exam-engine.js"></script><script src="./js/modules/language-exam-shell.js"></script><script>function run(){var out=[];function ok(name,cond){out.push((cond?'✅ ':'❌ ')+name); if(!cond) throw new Error(name);} try{ok('B2 Pilot vorhanden',!!window.LanguageB2ExamPilot); var info=window.LanguageB2ExamPilot.poolInfo(); ok('3 Lesevarianten',info.reading===3); ok('3 Hörvarianten',info.listening===3); ok('3 Schreibvarianten',info.writing===3); ok('3 Sprechvarianten',info.speaking===3); ok('81 Kombinationen',info.combinations===81); var at=window.LanguageB2ExamPilot.buildAttempt('phase38d1-test'); ok('B2 Attempt erzeugt',at && at.level==='B2'); ['reading','listening','writing','speaking'].forEach(function(p){ok('B2 '+p+' geladen',!!window.LanguageB2ExamPilot.getAttemptPart(at,p));}); ok('Exam Shell Diagnose D1', window.LanguageExamShell && window.LanguageExamShell.diagnostics().phase==='38D.1'); out.push('\nPoolInfo:\n'+JSON.stringify(info,null,2)); document.getElementById('out').className='ok';}catch(e){out.push('\nFEHLER: '+e.message); document.getElementById('out').className='bad';} document.getElementById('out').textContent=out.join('\n');}</script></body></html>
