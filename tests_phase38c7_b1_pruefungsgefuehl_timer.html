<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Phase 38C.7 – B1 Prüfungsgefühl Timer Test</title>
  <link rel="stylesheet" href="./css/language-course.css">
  <style>body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#f8fafc;color:#0f172a;margin:0;padding:18px}.box{max-width:980px;margin:0 auto;background:#fff;border:1px solid #e2e8f0;border-radius:22px;padding:18px;box-shadow:0 18px 40px rgba(15,23,42,.08)}button{border:0;border-radius:14px;padding:12px 14px;font-weight:800;margin:4px;cursor:pointer;background:#0f172a;color:#fff}.out{white-space:pre-wrap;background:#0f172a;color:#e2e8f0;border-radius:16px;padding:12px;margin-top:12px}</style>
</head>
<body>
  <div class="box">
    <h1>Phase 38C.7 – B1 Prüfungsgefühl / Timer</h1>
    <p>Diese Testseite prüft, ob die Exam Shell, Timer-Diagnose und visuelle Prüfungsdruck-Komponenten geladen sind.</p>
    <button onclick="diag()">Diagnose starten</button>
    <button onclick="startB1()">B1 Prüfung starten</button>
    <button onclick="forceTimer()">Timer-Demo erzwingen</button>
    <button onclick="clearExam()">Session löschen</button>
    <div id="out" class="out">Bereit.</div>
  </div>
  <script src="./data/language-ai-config.js"></script>
  <script src="./data/language-exam-blueprints.js"></script>
  <script src="./data/language-b1-exam-pilot.js"></script>
  <script src="./js/modules/language-speaking-ai-client.js"></script>
  <script src="./js/modules/language-exam-engine.js"></script>
  <script src="./js/modules/language-exam-shell.js"></script>
  <script>
    function out(v){ document.getElementById('out').textContent = typeof v === 'string' ? v : JSON.stringify(v,null,2); }
    function diag(){
      var d = window.LanguageExamShell && window.LanguageExamShell.diagnostics ? window.LanguageExamShell.diagnostics() : {ok:false,error:'LanguageExamShell fehlt'};
      out(d);
    }
    function startB1(){
      if(!window.LanguageExamShell) return out('LanguageExamShell fehlt');
      window.LanguageExamShell.start('B1');
      out('B1 gestartet. Prüfe sichtbare Timer-Leiste, Statuschips und Proctor-Hinweise.');
    }
    function forceTimer(){
      try{
        var s = window.LanguageExamShell.loadSession();
        if(!s){ window.LanguageExamShell.start('B1'); s = window.LanguageExamShell.loadSession(); }
        s.partStartedAt = s.partStartedAt || {};
        s.partStartedAt[s.currentPart || 'reading'] = new Date(Date.now() - 9*60*1000).toISOString();
        localStorage.setItem('language-academy-exam-shell-session-v6-b1-visual-pressure', JSON.stringify(s));
        window.LanguageExamShell.resume();
        out('Timer-Demo gesetzt. Der aktuelle Teil sollte Warnzustand zeigen.');
      }catch(e){ out(String(e)); }
    }
    function clearExam(){ if(window.LanguageExamShell){ window.LanguageExamShell.clearSession(); } out('Session gelöscht.'); }
  </script>
</body>
</html>
