<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Phase 38D.7 · B2 Gesamt-QA</title>
</head>
<body style="font-family:Arial,sans-serif;background:#07111f;color:#eaf4ff;padding:24px;line-height:1.45">
  <h1>Phase 38D.7 · B2 Gesamt-QA / Endsimulation</h1>
  <p>Prüft B2-Hardmode mit allen fünf Teilen, Szenarienmatrix, A1/B1-Abwehr, Fallback und Hilfsmodus-Markierung.</p>
  <pre id="out" style="white-space:pre-wrap;background:#0f1d33;border:1px solid #294260;border-radius:14px;padding:16px;overflow:auto">Lade Tests...</pre>

  <script src="./data/language-exam-blueprints.js"></script>
  <script src="./data/language-level-difficulty-rules.js"></script>
  <script src="./data/language-b1-exam-pilot.js"></script>
  <script src="./data/language-b2-exam-pilot.js"></script>
  <script src="./js/modules/language-exam-engine.js"></script>
  <script src="./js/modules/language-exam-shell.js"></script>
  <script>
  (function(){
    const lines=[];
    function ok(name,val,details){ lines.push((val?'✅ ':'❌ ')+name+(details?' · '+details:'')); }
    const info=window.LanguageB2ExamPilot && window.LanguageB2ExamPilot.poolInfo && window.LanguageB2ExamPilot.poolInfo();
    ok('B2 Pilot geladen', !!info);
    ok('B2 Pool 8/8/8/8/8', !!info && info.reading===8 && info.listening===8 && info.grammar===8 && info.writing===8 && info.speaking===8, info && [info.reading,info.listening,info.grammar,info.writing,info.speaking].join('/'));
    ok('B2 Kombinationen = 32768', !!info && info.combinations===32768, info && String(info.combinations));
    ok('Shell Phase 38D.7', window.LanguageExamShell && window.LanguageExamShell.diagnostics && window.LanguageExamShell.diagnostics().phase==='38D.7');
    ok('Engine B2 Gesamt-QA vorhanden', window.LanguageExamEngine && typeof window.LanguageExamEngine.validateB2HardmodeTotalQa==='function');

    const result=window.LanguageExamEngine && window.LanguageExamEngine.validateB2HardmodeTotalQa ? window.LanguageExamEngine.validateB2HardmodeTotalQa() : null;
    ok('B2 Gesamt-QA bestanden', !!result && result.ok);
    if(result){
      (result.checks||[]).forEach(c=>ok(c.name, c.ok, (c.score!=null?c.score+'%':'')+(c.words!=null?' · '+c.words+' Wörter':'')));
      lines.push('\nSzenarien:');
      (result.validation && result.validation.scenarios || []).forEach(s=>{
        lines.push((s.ok?'✅ ':'❌ ')+s.scenario+' → '+s.actual+' · Erwartung: '+s.expected+' · Gesamt: '+s.overall+'% · WeakParts: '+(s.weakParts||[]).join(', '));
      });
      lines.push('\nPoolInfo:\n'+JSON.stringify(info,null,2));
      lines.push('\nGesamtergebnis:\n'+JSON.stringify(result,null,2));
    }
    document.getElementById('out').textContent=lines.join('\n');
  })();
  </script>
</body>
</html>
