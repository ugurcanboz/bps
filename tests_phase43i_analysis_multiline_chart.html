<!doctype html>
<html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>G54.43.0 Analyse Multi-Line Chart QA</title></head>
<body><h1>G54.43.0 Analyse Multi-Line Chart QA</h1><pre id="out">running...</pre>
<script>
(async function(){
  const files = ['js/modules/egt-analysis-data-adapter.js','js/ui-home-renderer.js','css/phase39i-pixel-polish.css','service-worker.js','manifest.json','update-check.json'];
  const txt = {};
  for (const f of files) txt[f] = await (await fetch(f)).text();
  const checks = [];
  checks.push(['Adapter version', txt['js/modules/egt-analysis-data-adapter.js'].includes('G54.43.0-multiline-chart-data-binding')]);
  checks.push(['Adapter chart labels', txt['js/modules/egt-analysis-data-adapter.js'].includes('chart.labels') || txt['js/modules/egt-analysis-data-adapter.js'].includes('labels:xLabels')]);
  checks.push(['Adapter chart series', txt['js/modules/egt-analysis-data-adapter.js'].includes('series:series')]);
  checks.push(['UI dynamic legend', txt['js/ui-home-renderer.js'].includes('analysisV2LegendHtml') && txt['js/ui-home-renderer.js'].includes('data-analysis-chart-legend="adapter-bound"')]);
  checks.push(['UI multiline SVG', txt['js/ui-home-renderer.js'].includes('analysis-v2-chart-svg-multiline')]);
  checks.push(['Five line CSS', txt['css/phase39i-pixel-polish.css'].includes('line-d') && txt['css/phase39i-pixel-polish.css'].includes('line-e')]);
  checks.push(['Cache updated', txt['service-worker.js'].includes('egt-trainer-g54-43-0')]);
  checks.push(['Manifest updated', txt['manifest.json'].includes('G54.43.0')]);
  checks.push(['Update check updated', txt['update-check.json'].includes('G54.43.0')]);
  const passed = checks.every(x=>x[1]);
  document.getElementById('out').textContent = JSON.stringify({ phase:'G54.43.0', passed, checks }, null, 2);
})();
</script></body></html>
