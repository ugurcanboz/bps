<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Phase 39A Full UX Audit</title><style>body{font-family:system-ui;background:#020617;color:#e5e7eb;padding:24px;line-height:1.5}code,pre{background:#0f172a;border:1px solid #1f2937;border-radius:12px;padding:12px;display:block;overflow:auto}.ok{color:#22c55e}.warn{color:#f59e0b}.bad{color:#ef4444}table{border-collapse:collapse;width:100%;margin:16px 0}td,th{border:1px solid #334155;padding:10px;text-align:left}.card{background:#0f172a;border:1px solid #334155;border-radius:16px;padding:16px;margin:12px 0}</style></head><body><h1>Phase 39A – Full App UX Audit</h1><p class="ok">Audit-Artefakt vorhanden. Diese Datei prüft, ob die Phase-39A-Dateien im Paket liegen.</p><div id="out" class="card">Lade Audit-Ergebnis …</div><script>fetch('./phase39a_full_ux_audit_result.json').then(r=>r.json()).then(j=>{document.getElementById('out').innerHTML='<h2>Ergebnis</h2><p>Phase: <b>'+j.phase+'</b></p><p>Findings: <b>'+j.findings.length+'</b></p><pre>'+JSON.stringify(j.staticAudit,null,2)+'</pre>';}).catch(e=>{document.getElementById('out').innerHTML='<p class="bad">Audit JSON nicht ladbar: '+e.message+'</p>';});</script></body></html>
