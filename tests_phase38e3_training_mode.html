<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Phase 38E.3 · Trainingsmodus QA</title>
  <link rel="stylesheet" href="css/language-course.css">
</head>
<body>
  <main class="la-dashboard" style="padding:20px;max-width:1100px;margin:auto;">
    <section class="la-card">
      <span class="la-section-kicker">Phase 38E.3</span>
      <h1>Trainingsmodus aus Schwächenprofil</h1>
      <p>Diese Testseite prüft, ob Schwächenprofil-Karten direkte Trainingsstarts besitzen und ob eine fokussierte Trainingssession korrekt erzeugt wird.</p>
      <div id="qa-output" class="la-exam-warning">QA wird beim Laden ausgeführt.</div>
    </section>
  </main>
  <script src="data/language-exam-blueprints.js"></script>
  <script src="data/language-level-difficulty-rules.js"></script>
  <script src="data/language-b1-exam-pilot.js"></script>
  <script src="data/language-b2-exam-pilot.js"></script>
  <script src="js/modules/language-exam-engine.js"></script>
  <script src="js/modules/language-exam-shell.js"></script>
  <script>
    (function(){
      var out = document.getElementById('qa-output');
      var shell = window.LanguageExamShell;
      var ok = !!(shell && shell.diagnostics && shell.buildWeaknessProfile && shell.startTraining && shell.trainingModeBanner);
      var diag = ok ? shell.diagnostics() : null;
      var profile = ok ? shell.buildWeaknessProfile('B2', { level:'B2', completedParts:5, partScores:{ reading:84, listening:41, grammar:62, writing:71, speaking:88 } }) : null;
      var html = ok ? shell.weaknessProfileHtml('B2', { level:'B2', completedParts:5, partScores:{ reading:84, listening:41, grammar:62, writing:71, speaking:88 } }) : '';
      var hasTrainingButtons = html.indexOf('language-exam-training-start') >= 0 && html.indexOf('data-la-training-part="listening"') >= 0;
      var phaseOk = diag && diag.phase === '38E.3';
      var featureOk = diag && diag.features && diag.features.indexOf('weakness profile direct training start') >= 0;
      out.innerHTML = '<b>'+(ok && phaseOk && featureOk && hasTrainingButtons ? 'BESTANDEN' : 'FEHLER')+'</b><br>'+
        'Phase: '+(diag ? diag.phase : 'n/a')+'<br>'+
        'Schwächster Teil: '+(profile && profile.priority[0] ? profile.priority[0].label : 'n/a')+'<br>'+
        'Trainingsbuttons: '+(hasTrainingButtons ? 'vorhanden' : 'fehlen')+'<br>'+
        'API: '+(ok ? 'vorhanden' : 'fehlt');
    })();
  </script>
</body>
</html>
