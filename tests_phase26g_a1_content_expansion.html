<!doctype html><html lang="de"><head><meta charset="utf-8"><title>Phase 26G A1 Content Expansion Test</title><style>body{font-family:Arial,sans-serif;background:#0f172a;color:#e5e7eb;padding:24px}.pass{color:#22c55e}.fail{color:#ef4444}pre{white-space:pre-wrap;background:#111827;padding:16px;border-radius:12px}</style></head><body><h1>Phase 26G – A1 Inhaltsausbau Test</h1><pre id="out">Läuft...</pre><script>
(async function(){
  const out=document.getElementById('out');
  try{
    const text=await fetch('js/modules/language-course-entry-module.js').then(r=>r.text());
    const lessons=['a1-greetings','a1-introduce','a1-numbers','a1-time','a1-family','a1-shopping','a1-doctor','a1-work','a1-traffic','a1-everyday'];
    const types=['multiple_choice','matching','fill_blank','sentence_order','flashcard','true_false','listening_choice'];
    const results=[];
    results.push(['VERSION phase26g', text.includes('phase26g-a1-content-expansion')]);
    results.push(['10 A1 lesson ids', lessons.every(id=>text.includes('"'+id+'"'))]);
    results.push(['All task types included', types.every(t=>text.includes('"type": "'+t+'"'))]);
    results.push(['Task count marker 39', (text.match(/"tasks": 39/g)||[]).length>=10]);
    results.push(['No Admin change marker', text.includes('LanguageAcademyCourseEntry')]);
    const ok=results.every(x=>x[1]);
    out.innerHTML=results.map(x=>(x[1]?'✅ ':'❌ ')+x[0]).join('\n')+'\n\nGesamt: '+(ok?'PASS':'FAIL');
    out.className=ok?'pass':'fail';
  }catch(e){out.textContent='FAIL: '+e.message; out.className='fail';}
})();
</script></body></html>
