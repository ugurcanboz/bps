<!doctype html>
<html lang="de">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Phase 33B B2 Content + Speaking QA</title>
<style>body{font-family:Arial,sans-serif;background:#101827;color:#eef;padding:20px}.card{background:#172033;border:1px solid #2d3b55;border-radius:14px;padding:16px;margin:12px 0}.pass{color:#66e6a3}.fail{color:#ff7b7b}pre{white-space:pre-wrap;background:#0b1220;padding:12px;border-radius:10px;overflow:auto}</style></head>
<body>
<h1>Phase 33B – B2 Lessons 1–5 Content + Speaking QA</h1>
<div id="out" class="card">Warte auf Test...</div>
<script src="js/modules/language-course-entry-module.js"></script>
<script>
(function(){
  var out=document.getElementById('out');
  function line(ok,msg){return '<div class="'+(ok?'pass':'fail')+'">'+(ok?'PASS':'FAIL')+' · '+msg+'</div>';}
  try{
    var api=window.LanguageAcademyCourseEntry;
    var b2=api&&api.b2ContentSnapshot&&api.b2ContentSnapshot();
    var a2=api&&api.a2ContentSnapshot&&api.a2ContentSnapshot();
    var b1=api&&api.b1ContentSnapshot&&api.b1ContentSnapshot();
    var html='';
    html+=line(!!api,'API vorhanden');
    html+=line(!!(b2&&b2.ok),'B2 Content Snapshot OK');
    html+=line(b2&&b2.phase==='33B','Phase 33B');
    html+=line(b2&&b2.expandedLessons===5,'5 B2-Lektionen ausgebaut');
    html+=line(b2&&b2.starterLessons===5,'5 B2-Starter-Lektionen verbleiben');
    html+=line(b2&&b2.totalTasks===275,'B2 Aufgaben gesamt 275');
    html+=line(b2&&b2.normalTasks===215,'B2 Normalaufgaben 215');
    html+=line(b2&&b2.speakingTasks===60,'B2 Speaking 60');
    html+=line(a2&&a2.ok&&a2.totalTasks===430&&a2.speakingTasks===80,'A2 Regression OK');
    html+=line(b1&&b1.ok&&b1.totalTasks===430&&b1.speakingTasks===80,'B1 Regression OK');
    html+='<h2>Snapshot</h2><pre>'+JSON.stringify({b2:b2,a2:{ok:a2&&a2.ok,total:a2&&a2.totalTasks,speaking:a2&&a2.speakingTasks},b1:{ok:b1&&b1.ok,total:b1&&b1.totalTasks,speaking:b1&&b1.speakingTasks}},null,2)+'</pre>';
    out.innerHTML=html;
  }catch(e){out.innerHTML='<div class="fail">FAIL · '+String(e&&e.message||e)+'</div>';}
})();
</script>
</body>
</html>
