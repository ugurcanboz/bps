<!doctype html>
<html lang="de">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Phase 38D.6 · B2 Sprechen hart QA</title></head>
<body style="font-family:Arial,sans-serif;background:#07111f;color:#eaf4ff;padding:24px">
<h1>Phase 38D.6 · B2 Sprechen hart QA</h1>
<pre id="out" style="white-space:pre-wrap;background:#0f1d33;border:1px solid #294260;border-radius:14px;padding:16px">Lade Tests...</pre>
<script src="./data/language-exam-blueprints.js"></script>
<script src="./data/language-level-difficulty-rules.js"></script>
<script src="./data/language-b1-exam-pilot.js"></script>
<script src="./data/language-b2-exam-pilot.js"></script>
<script src="./js/modules/language-exam-engine.js"></script>
<script src="./js/modules/language-exam-shell.js"></script>
<script>
(function(){
  const lines=[];
  function ok(name,val,details){ lines.push((val?'✅ ':'❌ ')+name+(details?' · '+details:'')); }
  const info=window.LanguageB2ExamPilot && window.LanguageB2ExamPilot.poolInfo && window.LanguageB2ExamPilot.poolInfo();
  ok('B2 Pilot geladen', !!info);
  ok('B2 Lesen = 8', info && info.reading===8);
  ok('B2 Hören = 8', info && info.listening===8);
  ok('B2 Grammatik = 8', info && info.grammar===8);
  ok('B2 Schreiben = 8', info && info.writing===8);
  ok('B2 Sprechen = 8', info && info.speaking===8);
  ok('B2 Kombinationen = 32768', info && info.combinations===32768, info && String(info.combinations));

  const rules=window.LanguageLevelDifficultyRules;
  const b2Rule=rules && rules.get && rules.get('B2');
  ok('B2-Sprechprofil 180–350 Wörter', !!b2Rule && b2Rule.speakingWords[0]===180 && b2Rule.speakingWords[1]===350);

  const attempt=window.LanguageB2ExamPilot.buildAttempt('phase38d6-speaking');
  const task=window.LanguageB2ExamPilot.getAttemptPart(attempt,'speaking');
  ok('B2 Sprechaufgabe geladen', !!task && task.minWords===180 && task.maxWords===350, task && task.id);
  ok('Sprechaufgabe hat mindestens 6 Pflichtpunkte', !!task && task.requiredPoints && task.requiredPoints.length>=6);
  ok('Sprechaufgabe hat B2-Strukturvorgaben', !!task && task.requiredSpeechStructure && task.requiredSpeechStructure.length>=6);
  ok('Groq-Instruktion ist streng und B2-bezogen', !!task && task.assessmentRubric && /streng|B2|Hardmodus/i.test(task.assessmentRubric.groqInstruction||''));
  ok('Shell Phase 38D.6', window.LanguageExamShell && window.LanguageExamShell.diagnostics && window.LanguageExamShell.diagnostics().phase==='38D.6');

  const weak='Ich finde Homeoffice gut. Es ist gut, weil es gut ist.';
  const noOwnPosition='Das Thema Homeoffice wird in vielen Betrieben diskutiert, weil digitale Arbeit immer wichtiger wird. Einerseits sparen Beschäftigte Zeit und können Aufgaben konzentrierter erledigen. Außerdem sinkt für manche Firmen der Bedarf an Büroräumen. Andererseits kann der direkte Austausch im Team schwieriger werden, neue Mitarbeitende brauchen mehr Unterstützung und Datenschutz muss sorgfältig organisiert werden. Zum Beispiel kann eine Abteilung feste Präsenztage nutzen, damit wichtige Besprechungen nicht verloren gehen. Gleichzeitig sollten Unternehmen klare Regeln zu Arbeitszeiten, Erreichbarkeit und technischer Ausstattung festlegen. Aus diesem Grund ist ein gemischtes Modell mit Homeoffice und Bürotagen oft realistischer als eine vollständige Umstellung. Abschließend lässt sich sagen, dass Homeoffice Chancen bietet, aber nur mit Struktur, Vertrauen und gemeinsamen Regeln sinnvoll funktioniert. Dadurch bleiben Flexibilität, Teamkontakt und Produktivität besser im Gleichgewicht. Zusätzlich müssen Führungskräfte regelmäßig prüfen, ob die Arbeitsbelastung fair verteilt bleibt.';
  const noExample='Das Thema Homeoffice wird in vielen Unternehmen sehr intensiv diskutiert, weil sich die Arbeitswelt seit einigen Jahren stark verändert hat. Zunächst bietet Homeoffice deutliche Vorteile. Viele Beschäftigte sparen Zeit, weil sie nicht jeden Tag pendeln müssen, und sie können sich auf schwierige Aufgaben oft besser konzentrieren. Außerdem kann Homeoffice für Eltern oder Menschen mit langen Arbeitswegen eine große Entlastung sein. Einerseits erhöht flexible Arbeit die Motivation, weil private Termine und berufliche Aufgaben besser organisiert werden können. Andererseits gibt es auch Nachteile. Der Kontakt zum Team kann schwächer werden, neue Mitarbeitende lernen Abläufe manchmal langsamer kennen, und manche Menschen haben zu Hause keinen geeigneten Arbeitsplatz. Zusätzlich können Datenschutz, Arbeitszeit und Erreichbarkeit zu Problemen führen, wenn keine klaren Regeln bestehen. Aus meiner Sicht sollte Homeoffice dauerhaft möglich sein, aber nicht jeden Tag verpflichtend. Ich bin der Meinung, dass zwei oder drei Tage pro Woche realistisch sind, weil dadurch Flexibilität und Teamkontakt verbunden werden. Für Aufgaben mit viel Austausch sollten feste Bürotage bleiben. Abschließend würde ich empfehlen, klare Regeln zu Arbeitszeiten, Datenschutz, gemeinsamen Präsenztagen und technischer Ausstattung festzulegen und regelmäßig zu prüfen.';
  const strong='Das Thema Homeoffice wird in vielen Unternehmen sehr intensiv diskutiert, weil sich die Arbeitswelt seit einigen Jahren stark verändert hat. Zunächst bietet Homeoffice deutliche Vorteile. Viele Beschäftigte sparen Zeit, weil sie nicht jeden Tag pendeln müssen, und sie können sich auf schwierige Aufgaben oft besser konzentrieren. Außerdem kann Homeoffice für Eltern oder Menschen mit langen Arbeitswegen eine große Entlastung sein. Zum Beispiel hat eine Kollegin in meinem früheren Kurs berichtet, dass sie durch zwei Homeoffice-Tage pro Woche weniger Stress hatte, ihre Tochter pünktlich abholen konnte und ihre Aufgaben trotzdem zuverlässig erledigt hat. Dieses Beispiel zeigt, dass Flexibilität die Motivation erhöhen kann. Andererseits gibt es auch Nachteile. Der Kontakt zum Team kann schwächer werden, neue Mitarbeitende lernen Abläufe manchmal langsamer kennen, und manche Menschen haben zu Hause keinen geeigneten Arbeitsplatz. Auch Datenschutz und Erreichbarkeit müssen klar geregelt werden. Aus meiner Sicht sollte Homeoffice dauerhaft möglich sein, aber nicht jeden Tag verpflichtend. Ich bin der Meinung, dass zwei oder drei Tage pro Woche realistisch sind, weil dadurch Flexibilität und Teamkontakt verbunden werden. Für Aufgaben mit viel Austausch sollten feste Bürotage bleiben. Abschließend würde ich empfehlen, klare Regeln zu Arbeitszeiten, Datenschutz, gemeinsamen Präsenztagen und technischer Ausstattung festzulegen.';

  if(window.LanguageExamEngine && window.LanguageExamEngine.localAssessResponse){
    const rWeak=window.LanguageExamEngine.localAssessResponse({level:'B2',part:'speaking',task:task,userText:weak});
    const rNoOwn=window.LanguageExamEngine.localAssessResponse({level:'B2',part:'speaking',task:task,userText:noOwnPosition});
    const rNoExample=window.LanguageExamEngine.localAssessResponse({level:'B2',part:'speaking',task:task,userText:noExample});
    const rStrong=window.LanguageExamEngine.localAssessResponse({level:'B2',part:'speaking',task:task,userText:strong});
    ok('Kurze A1/B1-artige Antwort scheitert hart', rWeak && rWeak.score<=45 && !rWeak.passedLocal, rWeak && (rWeak.score+'%'));
    ok('Ohne eigene Position maximal 60%', rNoOwn && rNoOwn.score<=60 && !rNoOwn.passedLocal, rNoOwn && (rNoOwn.score+'%'));
    ok('Ohne Beispiel maximal 70%', rNoExample && rNoExample.score<=70 && !rNoExample.passedLocal, rNoExample && (rNoExample.score+'%'));
    ok('Strukturierte B2-Sprechantwort kann bestehen', rStrong && rStrong.wordCount>=180 && rStrong.score>=70 && rStrong.passedLocal, rStrong && (rStrong.wordCount+' Wörter · '+rStrong.score+'%'));
  }

  lines.push('\nPoolInfo:\n'+JSON.stringify(info,null,2));
  document.getElementById('out').textContent=lines.join('\n');
})();
</script>
</body></html>
