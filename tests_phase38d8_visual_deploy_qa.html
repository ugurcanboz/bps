<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Phase 38D.8 · B2 Visual Deploy QA</title>
  <style>
    body{font-family:Arial,system-ui,sans-serif;margin:0;background:#0f172a;color:#e5e7eb;padding:24px;line-height:1.5}
    main{max-width:1120px;margin:0 auto;display:grid;gap:16px}
    section{border:1px solid rgba(148,163,184,.25);background:rgba(15,23,42,.82);border-radius:20px;padding:16px}
    h1,h2{margin:.2rem 0 .6rem}.ok{color:#86efac}.fail{color:#fca5a5}
    table{width:100%;border-collapse:collapse;background:#020617;border-radius:14px;overflow:hidden}
    th,td{border-bottom:1px solid rgba(148,163,184,.18);padding:10px;text-align:left;vertical-align:top}
    th{background:#111827}.pill{display:inline-flex;border-radius:999px;padding:4px 8px;font-weight:800;background:#1e293b}
    code{color:#bfdbfe}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.card{background:#111827;border:1px solid rgba(148,163,184,.2);border-radius:14px;padding:12px}
    @media(max-width:760px){.grid{grid-template-columns:1fr}body{padding:12px}table{font-size:13px}}
  </style>
</head>
<body>
<main>
  <section>
    <h1>Phase 38D.8 · B2 Visual Deploy QA</h1>
    <p>Diese Datei prüft die gespeicherten QA-Ergebnisse und die geladenen App-Diagnosen. Der eigentliche Browserlauf wird durch <code>phase38d8_visual_deploy_qa.py</code> erzeugt.</p>
    <p id="summary" class="pill">Lade Ergebnis …</p>
  </section>
  <section>
    <h2>Runtime-Diagnose</h2>
    <pre id="runtime">warte …</pre>
  </section>
  <section>
    <h2>Geräte-Ergebnisse</h2>
    <div id="devices" class="grid"></div>
  </section>
  <section>
    <h2>Statische Checks</h2>
    <table><thead><tr><th>Check</th><th>Status</th></tr></thead><tbody id="staticRows"></tbody></table>
  </section>
</main>
<script src="./data/language-exam-blueprints.js"></script>
<script src="./data/language-level-difficulty-rules.js"></script>
<script src="./data/language-ai-config.js"></script>
<script src="./data/language-b1-exam-pilot.js"></script>
<script src="./data/language-b2-exam-pilot.js"></script>
<script src="./js/modules/language-ai-client.js"></script>
<script src="./js/modules/language-speaking-ai-client.js"></script>
<script src="./js/modules/language-exam-engine.js"></script>
<script src="./js/modules/language-exam-shell.js"></script>
<script>
(async function(){
  const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const runtime={
    hasShell:!!window.LanguageExamShell,
    shell:window.LanguageExamShell&&window.LanguageExamShell.diagnostics?window.LanguageExamShell.diagnostics():null,
    hasEngine:!!window.LanguageExamEngine,
    b2Qa:window.LanguageExamEngine&&window.LanguageExamEngine.validateB2HardmodeTotalQa?window.LanguageExamEngine.validateB2HardmodeTotalQa():null,
    b2Pool:window.LanguageB2ExamPilot&&window.LanguageB2ExamPilot.poolInfo?window.LanguageB2ExamPilot.poolInfo():null
  };
  document.getElementById('runtime').textContent=JSON.stringify(runtime,null,2);
  let data=null;
  try{ data=await fetch('./phase38d8_visual_deploy_qa_result.json',{cache:'no-store'}).then(r=>r.json()); }catch(e){ data={ok:false,errors:[String(e)],devices:[],staticChecks:[]}; }
  document.getElementById('summary').className=data.ok?'pill ok':'pill fail';
  document.getElementById('summary').textContent=data.ok?'BESTANDEN · Phase 38D.8':'FEHLER · Phase 38D.8';
  document.getElementById('devices').innerHTML=(data.devices||[]).map(d=>{
    const checks=(d.checks||[]).map(c=>`<li class="${c.ok?'ok':'fail'}">${esc(c.name)}: ${c.ok?'OK':'FEHLER'}</li>`).join('');
    const name=d.device&&d.device.name||'Gerät';
    return `<article class="card"><h3>${esc(name)}</h3><p class="${d.ok?'ok':'fail'}">${d.ok?'bestanden':'fehlgeschlagen'}</p><ul>${checks}</ul><small>Screenshot: ${esc(d.screenshot||'-')}</small></article>`;
  }).join('');
  document.getElementById('staticRows').innerHTML=(data.staticChecks||[]).map(c=>`<tr><td>${esc(c.name)}</td><td class="${c.ok?'ok':'fail'}">${c.ok?'OK':'FEHLER'}</td></tr>`).join('');
})();
</script>
</body>
</html>
