<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Phase 39D · Touch Target QA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#0f172a;color:#f8fafc;margin:0;padding:24px;line-height:1.5}
    main{max-width:1100px;margin:auto}
    .card{border:1px solid rgba(148,163,184,.25);background:rgba(15,23,42,.8);border-radius:22px;padding:18px;margin:14px 0}
    .ok{color:#22c55e}.bad{color:#ef4444}.warn{color:#f59e0b}
    pre{white-space:pre-wrap;word-break:break-word;background:rgba(2,6,23,.65);border-radius:14px;padding:12px}
    button{min-height:44px;border-radius:14px;border:1px solid rgba(96,165,250,.35);background:rgba(59,130,246,.15);color:#fff;padding:0 14px;font-weight:800}
    table{width:100%;border-collapse:collapse;margin-top:10px}
    th,td{border-bottom:1px solid rgba(148,163,184,.22);padding:8px;text-align:left;font-size:14px}
  </style>
</head>
<body>
<main>
  <h1>Phase 39D · Touch Target QA</h1>
  <p>Prüft sichtbare Buttons, rollenbasierte Buttons, Summary-Elemente und interaktive Karten auf 44px Mindestgröße.</p>
  <button id="run">QA erneut ausführen</button>
  <div id="result" class="card">Warte auf Testlauf…</div>
</main>
<script>
(function(){
  const SELECTOR = [
    'button',
    '[role="button"]',
    '.ui-deep-card',
    '.ui-training-area-card',
    '.ui-quick-card',
    '.ui-action-card',
    '.ui-foundation-menu-card',
    'summary'
  ].join(',');
  function visible(el){
    const r=el.getBoundingClientRect();
    const cs=getComputedStyle(el);
    return r.width>0 && r.height>0 && cs.display!=='none' && cs.visibility!=='hidden';
  }
  function label(el){
    return (el.innerText || el.getAttribute('aria-label') || el.dataset.uiAction || el.className || el.tagName || '').trim().replace(/\s+/g,' ').slice(0,90);
  }
  function run(){
    const small=[];
    const all=[];
    document.querySelectorAll(SELECTOR).forEach(el=>{
      if(!visible(el)) return;
      const r=el.getBoundingClientRect();
      const item={label:label(el), tag:el.tagName, cls:String(el.className||'').slice(0,120), w:Math.round(r.width), h:Math.round(r.height), action:el.dataset.uiAction||''};
      all.push(item);
      if(r.width<44 || r.height<44) small.push(item);
    });
    const overflowX = document.documentElement.scrollWidth - window.innerWidth;
    const res={time:new Date().toISOString(), checked:all.length, smallCount:small.length, small:small.slice(0,40), overflowX};
    const ok = res.checked>0 && res.smallCount===0 && overflowX<=1;
    document.getElementById('result').innerHTML =
      '<h2 class="'+(ok?'ok':'bad')+'">'+(ok?'BESTANDEN':'PRÜFEN')+'</h2>'+
      '<table><tr><th>Check</th><th>Wert</th></tr>'+
      '<tr><td>Geprüfte Elemente</td><td>'+res.checked+'</td></tr>'+
      '<tr><td>Unter 44px</td><td>'+res.smallCount+'</td></tr>'+
      '<tr><td>Horizontaler Overflow</td><td>'+res.overflowX+'</td></tr></table>'+
      '<pre>'+JSON.stringify(res,null,2)+'</pre>';
    window.__PHASE39D_TOUCH_QA_RESULT__=res;
  }
  document.getElementById('run').addEventListener('click', run);
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', run); else run();
})();
</script>
</body>
</html>
