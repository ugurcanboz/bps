<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Phase 38E.2 · Schwächenprofil QA</title>
  <link rel="stylesheet" href="css/language-course.css">
</head>
<body>
  <main class="la-dashboard" style="padding:20px;max-width:1100px;margin:auto;">
    <section class="la-card">
      <span class="la-section-kicker">Phase 38E.2</span>
      <h1>Lernstandsdetails / Schwächenprofil / Trainingspfade</h1>
      <p>Diese Testseite prüft statisch, ob die Schwächenprofil-API und UI-Klassen vorhanden sind. Für die Liveprüfung wird die App normal geöffnet.</p>
      <div id="qa-output" class="la-exam-warning">QA wird beim Laden ausgeführt.</div>
    </section>
  </main>
  <script src="data/language-exam-blueprints.js"></script>
  <script src="data/language-level-difficulty-rules.js"></script>
  <script src="data/language-b1-exam-pilot.js"></script>
  <script src="data/language-b2-exam-pilot.js"></script>
  <script src="js/modules/language-exam-engine.js"></script>
  <script src="js/modules/language-exam-shell.js"></script>
  <script>
    (function(){
      var out = document.getElementById('qa-output');
      var shell = window.LanguageExamShell;
      var ok = !!(shell && shell.diagnostics && shell.buildWeaknessProfile);
      var diag = ok ? shell.diagnostics() : null;
      var profile = ok ? shell.buildWeaknessProfile('B2', { level:'B2', completedParts:5, partScores:{ reading:82, listening:44, grammar:61, writing:74, speaking:88 } }) : null;
      var criticalFirst = profile && profile.priority && profile.priority[0] && profile.priority[0].part === 'listening';
      out.innerHTML = '<b>'+(ok && diag.phase === '38E.2' && criticalFirst ? 'BESTANDEN' : 'FEHLER')+'</b><br>' +
        'Phase: '+(diag ? diag.phase : 'n/a')+'<br>' +
        'Schwächster Teil: '+(profile && profile.priority[0] ? profile.priority[0].label : 'n/a')+'<br>' +
        'Trainingspfade: '+(profile ? profile.entries.length : 0);
    })();
  </script>
</body>
</html>
