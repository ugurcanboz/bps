<!doctype html><meta charset="utf-8"><title>G54.43.8K · Admin Tabbar Gesture Scroll QA</title>
<h1>G54.43.8K · Admin Tabbar Gesture Scroll QA</h1><pre id="out"></pre>
<script>
(async()=>{
 const files={
  css: await fetch('./css/admin-portal.css').then(r=>r.text()),
  js: await fetch('./js/admin-participant-engine.js').then(r=>r.text()),
  app: await fetch('./js/core/app-config.js').then(r=>r.text()),
  qa: await fetch('./js/qa/egt-visual-state-capture.js').then(r=>r.text()),
  upd: await fetch('./update-check.json').then(r=>r.text()),
  sw: await fetch('./service-worker.js').then(r=>r.text())
 };
 const checks=[]; const ok=(n,v)=>checks.push({name:n,status:v?'PASS':'FAIL'});
 ok('Version AppConfig G54.43.8K', files.app.includes("var VERSION = 'G54.43.8K'"));
 ok('QA Capture G54.43.8K', files.qa.includes("var VERSION = 'G54.43.8K'"));
 ok('Update Check G54.43.8K', files.upd.includes('G54.43.8K-2026-06-22'));
 ok('SW Cache G54.43.8K', files.sw.includes('egt-trainer-g54-43-8k'));
 ok('Gesture Assist JS', files.js.includes('installAdminTabbarGestureAssist') && files.js.includes('absX > absY * 0.45'));
 ok('Logout eigene mobile Zeile', files.css.includes('grid-template-rows: auto auto') && files.css.includes('> .egt-logout-tab'));
 ok('Tabbar pan-x', files.css.includes('touch-action: pan-x'));
 document.getElementById('out').textContent=JSON.stringify({phase:'G54.43.8K',checks},null,2);
 if(checks.some(c=>c.status==='FAIL')) throw new Error('G54.43.8K QA failed');
})();
</script>
