<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Phase 35A · C2 Course + Speaking Structure QA</title>
<style>body{font-family:Arial,sans-serif;margin:24px;background:#f6f7fb;color:#101828}.card{background:#fff;border-radius:16px;padding:18px;margin:12px 0;box-shadow:0 8px 24px rgba(16,24,40,.08)}.ok{color:#067647}.bad{color:#b42318}pre{white-space:pre-wrap;background:#111827;color:#e5e7eb;padding:12px;border-radius:12px;overflow:auto}</style>
</head>
<body>
<h1>Phase 35A · C2 Course + Speaking Structure QA</h1>
<div id="out" class="card">Lade Test…</div>
<script src="js/modules/language-course-entry-module.js"></script>
<script>
(function(){
  const out=document.getElementById('out');
  const errors=[];
  const api=window.LanguageAcademyCourseEntry;
  if(!api) errors.push('LanguageAcademyCourseEntry fehlt');
  const snap=api&&api.c2StructureSnapshot?api.c2StructureSnapshot():null;
  if(!snap) errors.push('c2StructureSnapshot fehlt');
  if(snap){
    if(snap.phase!=='35A') errors.push('Phase ist nicht 35A');
    if(snap.lessons!==10) errors.push('C2 Lektionen != 10');
    if(snap.totalTasks!==120) errors.push('C2 Aufgaben != 120');
    if(snap.normalTasks!==80) errors.push('C2 normale Aufgaben != 80');
    if(snap.speakingTasks!==40) errors.push('C2 Speaking != 40');
    if(!snap.ok) errors.push('Snapshot ok=false');
    ['a2','b1','b2','c1'].forEach(k=>{ if(!snap.regression||!snap.regression[k]||!snap.regression[k].ok) errors.push('Regression '+k+' fehlerhaft'); });
  }
  out.innerHTML='<h2 class="'+(errors.length?'bad':'ok')+'">'+(errors.length?'FAIL':'PASS')+'</h2><pre>'+JSON.stringify({errors,snapshot:snap},null,2)+'</pre>';
})();
</script>
</body>
</html>
