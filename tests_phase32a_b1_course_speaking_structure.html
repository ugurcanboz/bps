<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Phase 32A QA – B1 Kursstruktur + Speaking</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0b1020;color:#eef3ff;margin:0;padding:24px;line-height:1.5}
    .card{max-width:980px;margin:auto;background:#141b33;border:1px solid rgba(255,255,255,.14);border-radius:18px;padding:22px}
    pre{background:#070b16;border-radius:12px;padding:16px;overflow:auto}.pass{color:#6ee7b7}.fail{color:#fca5a5}
  </style>
</head>
<body>
  <main class="card">
    <h1>Phase 32A QA</h1>
    <p>Prüft B1 Kursstruktur + Speaking-Struktur. B1 muss 10 Lektionen, 120 Startaufgaben und 40 Sprechaufgaben enthalten.</p>
    <pre id="out">Warte auf App...</pre>
  </main>
  <script src="js/i18n/language-store.js"></script>
  <script src="js/i18n/language-adapter.js"></script>
  <script src="js/modules/language-adaptive-engine.js"></script>
  <script src="js/modules/language-course-cloud-sync.js"></script>
  <script src="js/modules/language-course-entry-module.js"></script>
  <script>
    (function(){
      var out=document.getElementById('out');
      function line(txt,ok){return (ok?'✅ ':'❌ ')+txt;}
      setTimeout(function(){
        var api=window.LanguageAcademyCourseEntry;
        var snap=api&&api.b1StructureSnapshot&&api.b1StructureSnapshot();
        var diag=api&&api.diagnostics&&api.diagnostics();
        var a2=api&&api.a2ContentSnapshot&&api.a2ContentSnapshot();
        var checks=[];
        checks.push(['API vorhanden', !!api]);
        checks.push(['b1StructureSnapshot vorhanden', !!(api&&api.b1StructureSnapshot)]);
        checks.push(['Version G54.17', !!(api&&String(api.__version||'').indexOf('G54.17')===0)]);
        checks.push(['Phase 32A', !!snap && snap.phase==='32A']);
        checks.push(['B1 geöffnet', !!snap && snap.level==='b1']);
        checks.push(['10 B1-Lektionen', !!snap && snap.lessons===10]);
        checks.push(['120 B1-Startaufgaben', !!snap && snap.totalTasks===120]);
        checks.push(['80 normale B1-Aufgaben', !!snap && snap.normalTasks===80]);
        checks.push(['40 B1-Sprechaufgaben', !!snap && snap.speakingTasks===40]);
        checks.push(['Parallel-Build-Regel aktiv', !!snap && snap.parallelBuildPolicy && snap.parallelBuildPolicy.active===true]);
        Object.keys((snap&&snap.perLesson)||{}).forEach(function(id){
          var l=snap.perLesson[id];
          checks.push([id+' = 12 Aufgaben', !!l && l.tasks===12]);
          checks.push([id+' = 4 Speaking', !!l && l.speakingTasks===4]);
          checks.push([id+' parallelSpeaking', !!l && l.parallelSpeaking===true]);
          checks.push([id+' ok', !!l && l.ok===true]);
        });
        checks.push(['A2 Regression ok', !!a2 && a2.ok===true && a2.totalTasks===430 && a2.speakingTasks===80]);
        checks.push(['Diagnostics Phase 32A', !!diag && diag.phase==='32A']);
        checks.push(['Diagnostics enthält B1 ok', !!diag && diag.b1Structure && diag.b1Structure.ok===true]);
        var ok=checks.every(function(c){return c[1];});
        out.className=ok?'pass':'fail';
        out.textContent=checks.map(function(c){return line(c[0],c[1]);}).join('\n')+'\n\nB1 Snapshot:\n'+JSON.stringify(snap,null,2)+'\n\nA2 Regression:\n'+JSON.stringify({ok:a2&&a2.ok,totalTasks:a2&&a2.totalTasks,speakingTasks:a2&&a2.speakingTasks},null,2);
      },250);
    })();
  </script>
</body>
</html>
