<!doctype html><html lang="de"><head><meta charset="utf-8"><title>Phase 27D Review Suggestions Test</title></head><body>
<h1>Phase 27D Review Suggestions</h1>
<script src="./js/i18n/language-store.js"></script>
<script src="./js/i18n/translation-engine.js"></script>
<script src="./js/i18n/help-system.js"></script>
<script src="./js/i18n/language-adapter.js"></script>
<script src="./js/modules/language-adaptive-engine.js"></script>
<script src="./js/modules/language-course-entry-module.js"></script>
<script>
(function(){
  var mod=window.LanguageAcademyCourseEntry;
  function assert(c,m){ if(!c) throw new Error(m); }
  assert(mod,'LanguageAcademyCourseEntry fehlt');
  assert(typeof mod.coachReviewSets==='function','coachReviewSets fehlt');
  var sets=mod.coachReviewSets();
  assert(Array.isArray(sets),'Reviewsets sind kein Array');
  assert(sets.length>=1,'mindestens ein Wiederholungsset erwartet');
  assert(sets.every(function(x){return x.title&&x.action;}),'Reviewsets brauchen title/action');
  document.body.insertAdjacentHTML('beforeend','<p>PASS Phase 27D – '+sets.length+' Wiederholungssets erzeugt.</p>');
})();
</script></body></html>
