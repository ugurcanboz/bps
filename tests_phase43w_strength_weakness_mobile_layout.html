<!doctype html><meta charset="utf-8"><title>G54.43.8G · Strength/Weakness Mobile Layout QA</title>
<h1>G54.43.8G · Strength/Weakness Mobile Layout QA</h1><pre id="out"></pre>
<script>
(async()=>{
  const files = {
    css: await fetch('css/phase39i-pixel-polish.css').then(r=>r.text()),
    app: await fetch('js/core/app-config.js').then(r=>r.text()),
    renderer: await fetch('js/ui-home-renderer.js').then(r=>r.text()),
    qa: await fetch('js/qa/egt-visual-state-capture.js').then(r=>r.text()),
    index: await fetch('index.html').then(r=>r.text())
  };
  const checks=[];
  function ok(name, pass, detail=''){ checks.push({name, pass:!!pass, detail}); }
  ok('AppConfig G54.43.8G', files.app.includes("var VERSION = 'G54.43.8G'"));
  ok('Index build G54.43.8G', files.index.includes('G54.43.8G-2026-06-22'));
  ok('QA capture G54.43.8G', files.qa.includes("var VERSION = 'G54.43.8G'"));
  ok('Dashboard marker aktualisiert', files.renderer.includes('data-analysis-dashboard-v2="G54.43.8G"'));
  ok('Mobile media max-width 520 vorhanden', /@media \(max-width:\s*520px\)/.test(files.css));
  ok('Bar row mobile two columns', files.css.includes('grid-template-columns: minmax(0, 1fr) auto !important'));
  ok('Bar row mobile two rows', files.css.includes('grid-template-rows: auto auto !important'));
  ok('Bar track moved to second row', files.css.includes('grid-row: 2 !important'));
  ok('Bar track spans full width', files.css.includes('grid-column: 1 / 3 !important'));
  ok('Label/badge flex wrap safe', files.css.includes('flex-wrap: wrap !important'));
  ok('Percent value isolated right', files.css.includes('min-width: 40px !important') && files.css.includes('white-space: nowrap !important'));
  ok('Mobile row min-height >= 48', files.css.includes('min-height: 48px !important'));
  ok('Top weakness min-height >= 58', files.css.includes('min-height: 58px !important'));
  ok('Monster detector still active', files.qa.includes('detectStrengthWeaknessCollisions') && files.qa.includes('strength_weakness_badge_bar_collision'));
  const pass = checks.every(c=>c.pass);
  document.getElementById('out').textContent = (pass?'PASS':'FAIL')+' '+checks.filter(c=>c.pass).length+'/'+checks.length+'\n'+checks.map(c=>(c.pass?'✓ ':'✗ ')+c.name+(c.detail?' · '+c.detail:'')).join('\n');
})();
</script>
