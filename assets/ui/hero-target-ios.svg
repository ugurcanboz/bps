<svg xmlns="http://www.w3.org/2000/svg" width="520" height="360" viewBox="0 0 520 360" fill="none">
  <defs>
    <radialGradient id="softAura" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.28"/>
      <stop offset="45%" stop-color="#2563EB" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringA" x1="115" y1="58" x2="360" y2="290" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.48" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#C026D3"/>
    </linearGradient>
    <linearGradient id="ringB" x1="170" y1="88" x2="315" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.52" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="arrowA" x1="284" y1="151" x2="474" y2="39" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.52" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="arrowB" x1="418" y1="43" x2="487" y2="104" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
  </defs>

  <rect width="520" height="360" fill="none"/>
  <ellipse cx="272" cy="184" rx="210" ry="164" fill="url(#softAura)"/>

  <!-- soft shadow without SVG filters -->
  <ellipse cx="250" cy="229" rx="124" ry="34" fill="#000" opacity="0.22"/>

  <!-- target rings: crisp vector strokes, no blur/filter -->
  <circle cx="248" cy="164" r="118" fill="#07112B" stroke="url(#ringA)" stroke-width="12"/>
  <circle cx="248" cy="164" r="88" fill="#0B1D48" stroke="url(#ringB)" stroke-width="10"/>
  <circle cx="248" cy="164" r="58" fill="#251052" stroke="#A855F7" stroke-width="9"/>
  <circle cx="248" cy="164" r="27" fill="#E879F9"/>
  <circle cx="248" cy="164" r="12" fill="#100B2D"/>

  <!-- arrow, same desktop direction and feel -->
  <path d="M286 153L426 52L440 82L312 176L286 153Z" fill="url(#arrowA)"/>
  <path d="M426 52L468 24L459 72L440 82L426 52Z" fill="#60A5FA"/>
  <path d="M440 82L482 84L448 114L312 176L440 82Z" fill="url(#arrowB)" opacity="0.94"/>

  <!-- glow dots as crisp circles -->
  <circle cx="116" cy="112" r="18" fill="#22D3EE" opacity="0.84"/>
  <circle cx="398" cy="224" r="21" fill="#38BDF8" opacity="0.80"/>
  <circle cx="376" cy="80" r="10" fill="#60A5FA" opacity="0.88"/>
  <circle cx="156" cy="237" r="8" fill="#A855F7" opacity="0.86"/>
  <circle cx="448" cy="151" r="7" fill="#2563EB" opacity="0.88"/>
</svg>
