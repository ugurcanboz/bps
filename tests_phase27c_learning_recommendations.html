<!doctype html><html lang="de"><head><meta charset="utf-8"><title>Phase 27C Learning Recommendations Test</title></head><body>
<h1>Phase 27C Learning Recommendations Test</h1>
<pre id="out">Running...</pre>
<script src="./js/modules/language-course-entry-module.js"></script>
<script>
(function(){
  const out=document.getElementById('out');
  const api=window.LanguageAcademyCourseEntry;
  const checks=[];
  function ok(name, cond){ checks.push((cond?'PASS ':'FAIL ')+name); if(!cond) throw new Error(name); }
  ok('LanguageAcademyCourseEntry exists', !!api);
  ok('coachInsight export exists', typeof api.coachInsight==='function');
  ok('coachRecommendations export exists', typeof api.coachRecommendations==='function');
  const c=api.coachInsight();
  const recs=api.coachRecommendations(c);
  ok('coachInsight returns title', !!c.title);
  ok('recommendations array exists', Array.isArray(recs));
  ok('recommendations not empty', recs.length>0);
  ok('recommendation has action', !!recs[0].action);
  ok('recommendation has reason', !!recs[0].reason);
  out.textContent=checks.join('\n');
})();
</script></body></html>
