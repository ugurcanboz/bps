<!doctype html><html lang="de"><head><meta charset="utf-8"><title>Phase 26D Audio QA</title></head><body>
<h1>Phase 26D Audio-/Hörverständnis QA</h1>
<pre id="out">running...</pre>
<script>
(async function(){
  const out=document.getElementById('out');
  try{
    const js=await fetch('./js/modules/language-course-entry-module.js').then(r=>r.text());
    const css=await fetch('./css/language-course.css').then(r=>r.text());
    const checks=[
      ['version phase26d', js.includes('phase26d-audio-listening-foundation')],
      ['listening task type exists', js.includes('listening_choice')],
      ['speech fallback exists', js.includes('speechSynthesis') && js.includes('SpeechSynthesisUtterance')],
      ['audio play action exists', js.includes('language-course-play-audio')],
      ['open listening action exists', js.includes('language-course-open-listening')],
      ['audio dashboard card exists', js.includes('Hörverständnis') && js.includes('Audio testen')],
      ['task registry extended', js.includes("listening_choice:{label:'Hörverständnis'" )],
      ['audio css exists', css.includes('.la-audio-task') && css.includes('.la-audio-play')]
    ];
    const failed=checks.filter(c=>!c[1]);
    out.textContent=checks.map(c=>(c[1]?'PASS ':'FAIL ')+c[0]).join('\n')+(failed.length?'\n\nRESULT: FAIL':'\n\nRESULT: PASS');
    document.body.dataset.result=failed.length?'fail':'pass';
  }catch(e){out.textContent='ERROR '+e.message;document.body.dataset.result='fail';}
})();
</script></body></html>
