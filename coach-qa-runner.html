<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coach QA Runner</title>
  <link rel="stylesheet" href="css/learning-coach.css" />
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e5e7eb;margin:0;padding:24px;}
    .card{max-width:900px;margin:0 auto;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
    button{border:0;border-radius:14px;padding:12px 16px;font-weight:700;margin:4px;background:#e5e7eb;color:#0f172a;cursor:pointer}
    pre{white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.3);border-radius:16px;padding:16px;line-height:1.45}
    .ok{color:#86efac}.bad{color:#fca5a5}
  </style>
</head>
<body>
  <div class="card">
    <h1>Coach QA Runner</h1>
    <p>Interner Prüfmodus für das Coach-Modul vor Integration in die Haupt-App.</p>
    <button onclick="runQa()">QA Self Check starten</button>
    <button onclick="repair()">Memory reparieren</button>
    <button onclick="health()">Memory Health</button>
    <pre id="out">Bereit.</pre>
  </div>
  <script src="data/coach-knowledge-base.js"></script>
  <script src="data/question-bank.js"></script>
  <script src="data/question-bank-mathe.js"></script>
  <script src="data/question-bank-kaufm.js"></script>
  <script src="data/question-bank-sozial.js"></script>
  <script src="data/question-bank-it-extra.js"></script>
  <script src="js/learning-coach-engine.js"></script>
  <script src="js/learning-coach-ui.js"></script>
  <script>
    function write(data){ document.getElementById('out').textContent = JSON.stringify(data, null, 2); }
    function runQa(){ write(window.BPSLearningCoachEngine.qaSelfCheck()); }
    function repair(){ write(window.BPSLearningCoachEngine.repairMemory()); }
    function health(){ write(window.BPSLearningCoachEngine.memoryHealthReport()); }
    window.addEventListener('DOMContentLoaded', function(){ if(window.BPSLearningCoach) window.BPSLearningCoach.init({ autoOpen:false }); });
  </script>
</body>
</html>
