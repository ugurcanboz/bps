<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FlowLogic Standalone Test</title>
  <link rel="stylesheet" href="../src/flowlogic.css">
  <style>
    body{margin:0;background:#08111f;color:#eef6ff;font-family:system-ui,-apple-system,Segoe UI,sans-serif;padding:24px;}
    .test-shell{max-width:1200px;margin:0 auto;}
    .test-actions{display:flex;flex-wrap:wrap;gap:10px;margin:16px 0;}
    button{border:0;border-radius:12px;padding:10px 14px;font-weight:800;cursor:pointer;}
    pre{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:16px;white-space:pre-wrap;overflow:auto;}
  </style>
</head>
<body>
  <main class="test-shell">
    <h1>FlowLogic Standalone Test</h1>
    <p>Diese Datei ist nur ein Test-Harness fuer das getrennte Modul. Sie ist keine Haupt-App.</p>
    <div class="test-actions">
      <button onclick="runSelfTest()">SelfTest</button>
      <button onclick="runBatch()">Generator Batch</button>
      <button onclick="FlowLogicModule.start({mode:'training'})">Modul starten</button>
      <button onclick="renderInline()">Inline rendern</button>
    </div>
    <div id="mount"></div>
    <pre id="out">Bereit.</pre>
  </main>

  <script src="../src/flowlogic.selftest.js"></script>
  <script src="../src/flowlogic.schema.js"></script>
  <script src="../src/flowlogic.scenarios.js"></script>
  <script src="../src/flowlogic.mutations.js"></script>
  <script src="../src/flowlogic.validator.js"></script>
  <script src="../src/flowlogic.renderer.js"></script>
  <script src="../src/flowlogic.input.js"></script>
  <script src="../src/flowlogic.scorer.js"></script>
  <script src="../src/flowlogic.generator.js"></script>
  <script src="../src/flowlogic.module.js"></script>
  <script>
    const out = document.getElementById('out');
    function print(x){ out.textContent = typeof x === 'string' ? x : JSON.stringify(x, null, 2); }
    async function runSelfTest(){ print(await FlowLogicSelfTest.runAll({silent:true})); }
    function runBatch(){ print(FlowLogicGenerator.generateBatch({ amount:50, seed:'standalone-test', difficulty:'ctc' })); }
    function renderInline(){
      const mount = document.getElementById('mount');
      mount.innerHTML = '';
      FlowLogicModule.mount(mount, { mode:'standalone-test' });
      print(FlowLogicModule.status());
    }
    FlowLogicModule.init({ source:'standalone-test' });
  </script>
</body>
</html>
