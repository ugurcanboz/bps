<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Phase 31C QA – A2 Lektionen 6–10 Content + Speaking</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0b1020;color:#eef3ff;margin:0;padding:24px;line-height:1.5}
    .card{max-width:980px;margin:auto;background:#141b33;border:1px solid rgba(255,255,255,.14);border-radius:18px;padding:22px}
    pre{background:#070b16;border-radius:12px;padding:16px;overflow:auto}.pass{color:#6ee7b7}.fail{color:#fca5a5}
  </style>
</head>
<body>
  <main class="card">
    <h1>Phase 31C QA</h1>
    <p>Prüft A2 Lektionen 6–10: Inhalt + Speaking parallel. A2 muss jetzt komplett ausgebaut sein.</p>
    <pre id="out">Warte auf App...</pre>
  </main>
  <script src="js/i18n/language-store.js"></script>
  <script src="js/i18n/language-adapter.js"></script>
  <script src="js/modules/language-adaptive-engine.js"></script>
  <script src="js/modules/language-course-cloud-sync.js"></script>
  <script src="js/modules/language-course-entry-module.js"></script>
  <script>
    (function(){
      var out=document.getElementById('out');
      function line(txt,ok){return (ok?'✅ ':'❌ ')+txt;}
      setTimeout(function(){
        var api=window.LanguageAcademyCourseEntry;
        var snap=api&&api.a2ContentSnapshot&&api.a2ContentSnapshot();
        var checks=[];
        checks.push(['API vorhanden', !!api]);
        checks.push(['a2ContentSnapshot vorhanden', !!(api&&api.a2ContentSnapshot)]);
        checks.push(['Phase 31C', !!snap && snap.phase==='31C']);
        checks.push(['10 Lektionen ausgebaut', !!snap && snap.expandedLessons===10]);
        checks.push(['0 Starter-Lektionen bleiben', !!snap && snap.starterLessons===0]);
        checks.push(['A2 gesamt 430 Aufgaben', !!snap && snap.totalTasks===430]);
        checks.push(['A2 Speaking 80 Aufgaben', !!snap && snap.speakingTasks===80]);
        checks.push(['A2 normal 350 Aufgaben', !!snap && snap.normalTasks===350]);
        ['a2-work-school','a2-travel-orientation','a2-food-restaurant','a2-past-experiences','a2-opinions-plans'].forEach(function(id){
          var l=snap&&snap.perLesson&&snap.perLesson[id];
          checks.push([id+' = 43 Aufgaben', !!l && l.tasks===43]);
          checks.push([id+' = 8 Speaking', !!l && l.speakingTasks===8]);
          checks.push([id+' parallel ok', !!l && l.ok===true]);
        });
        var ok=checks.every(function(c){return c[1];});
        out.className=ok?'pass':'fail';
        out.textContent=checks.map(function(c){return line(c[0],c[1]);}).join('\n')+'\n\nSnapshot:\n'+JSON.stringify(snap,null,2);
      },250);
    })();
  </script>
</body>
</html>
