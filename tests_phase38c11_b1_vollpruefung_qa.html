<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Phase 38C.11 · B1 Vollprüfung QA</title>
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/language-course.css">
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:18px;background:#f8fafc;color:#0f172a}
    .box{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:16px;margin:12px 0;box-shadow:0 10px 25px rgba(15,23,42,.06)}
    button{border:0;border-radius:12px;padding:10px 14px;font-weight:800;margin:4px;background:#111827;color:white}
    button.secondary{background:#334155}
    pre{white-space:pre-wrap;background:#0f172a;color:#e5e7eb;border-radius:12px;padding:12px;overflow:auto}
    table{width:100%;border-collapse:collapse;background:white;border-radius:14px;overflow:hidden}
    th,td{border-bottom:1px solid #e2e8f0;padding:10px;text-align:left;vertical-align:top}
    .ok{color:#047857;font-weight:800}.bad{color:#b91c1c;font-weight:800}
  </style>
</head>
<body>
  <h1>Phase 38C.11 · B1 Vollprüfung QA / Endsimulation</h1>
  <p>Testet komplette B1-Endfälle: bestanden, knapp, nicht bestanden, schwaches Sprechen, falsches Schreibthema, unvollständiger Hörteil und Groq-Fallback.</p>

  <div class="box">
    <button onclick="diagnose()">Diagnose starten</button>
    <button onclick="runAll()">Alle QA-Szenarien prüfen</button>
    <button onclick="showScenario('good-pass')">Gut bestanden</button>
    <button onclick="showScenario('borderline-pass')">Knapp bestanden</button>
    <button onclick="showScenario('borderline-fail')">Knapp nicht bestanden</button>
    <button onclick="showScenario('weak-speaking')">Sprechen schwach</button>
    <button onclick="showScenario('wrong-writing-topic')">Schreiben Thema falsch</button>
    <button onclick="showScenario('incomplete-listening')">Hören offen</button>
    <button onclick="showScenario('groq-down-fallback')">Groq-Fallback</button>
    <button class="secondary" onclick="openExam()">Exam Shell öffnen</button>
  </div>

  <div class="box" id="tableBox"><b>Status:</b> Bereit.</div>
  <pre id="out">Bereit.</pre>

  <script src="data/language-exam-blueprints.js"></script>
  <script src="data/language-ai-config.js"></script>
  <script src="data/language-b1-exam-pilot.js"></script>
  <script src="js/modules/language-speaking-ai-client.js"></script>
  <script src="js/modules/language-exam-engine.js"></script>
  <script src="js/modules/language-exam-shell.js"></script>
  <script>
    function out(x){ document.getElementById('out').textContent = typeof x === 'string' ? x : JSON.stringify(x,null,2); }
    function renderTable(data){
      var rows = (data.scenarios || data || []).map(function(x){
        return '<tr><td>'+x.scenario+'</td><td>'+x.expected+'</td><td>'+x.actual+'</td><td class="'+(x.ok?'ok':'bad')+'">'+(x.ok?'OK':'FEHLER')+'</td><td>'+x.overall+'%</td><td>'+x.readiness+'</td><td>'+((x.weakParts||[]).join(', ')||'—')+'</td></tr>';
      }).join('');
      document.getElementById('tableBox').innerHTML = '<table><thead><tr><th>Szenario</th><th>Erwartet</th><th>Ist</th><th>Status</th><th>Score</th><th>Prognose</th><th>Schwache Teile</th></tr></thead><tbody>'+rows+'</tbody></table>';
    }
    function diagnose(){
      var shell = window.LanguageExamShell && window.LanguageExamShell.diagnostics ? window.LanguageExamShell.diagnostics() : null;
      var pool = window.LanguageB1ExamPilot && window.LanguageB1ExamPilot.poolInfo ? window.LanguageB1ExamPilot.poolInfo() : null;
      var qa = window.LanguageExamEngine && window.LanguageExamEngine.validateB1FullExamQaScenarios ? window.LanguageExamEngine.validateB1FullExamQaScenarios() : {ok:false,error:'QA-Funktion fehlt'};
      renderTable(qa);
      out({ shell:shell, pool:pool, qa:qa });
    }
    function runAll(){
      var qa = window.LanguageExamEngine.validateB1FullExamQaScenarios();
      renderTable(qa);
      out(qa);
    }
    function showScenario(name){
      var session = window.LanguageExamEngine.createB1FullQaSession(name);
      out(session.final);
      document.getElementById('tableBox').innerHTML = '<b>'+name+'</b><p>Entscheidung: <b>'+session.final.examDecision+'</b> · Gesamt: '+session.final.overallScore+'% · Prognose: '+session.final.readiness+'</p>';
    }
    function openExam(){
      try{ window.LanguageExamShell.open(); }
      catch(e){ out('Exam Shell konnte nicht geöffnet werden: '+e.message); }
    }
  </script>
</body>
</html>
