<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Phase 33A – B2 Course + Speaking Structure QA</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f172a;color:#e5e7eb;margin:0;padding:24px;}
    .card{max-width:980px;margin:0 auto;background:#111827;border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:20px;box-shadow:0 18px 60px rgba(0,0,0,.35)}
    h1{margin-top:0;font-size:24px}.ok{color:#34d399}.bad{color:#fb7185}pre{white-space:pre-wrap;background:#020617;border-radius:12px;padding:14px;overflow:auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}.tile{background:#1f2937;border-radius:14px;padding:12px}.small{opacity:.75;font-size:13px}
  </style>
</head>
<body>
  <main class="card">
    <h1>Phase 33A – B2 Course + Speaking Structure QA</h1>
    <p class="small">Prüft B2-Struktur, Speaking-Parallelität sowie A2/B1 Regression.</p>
    <div id="summary" class="grid"></div>
    <h2>Details</h2>
    <pre id="out">Lade Modul...</pre>
  </main>
  <script src="js/modules/language-course-entry-module.js"></script>
  <script>
    (function(){
      var out=document.getElementById('out');
      var summary=document.getElementById('summary');
      function tile(label,value,ok){var div=document.createElement('div');div.className='tile';div.innerHTML='<strong>'+label+'</strong><br><span class="'+(ok?'ok':'bad')+'">'+value+'</span>';summary.appendChild(div);}
      try{
        var api=window.LanguageAcademyCourseEntry;
        var b2=api&&api.b2StructureSnapshot&&api.b2StructureSnapshot();
        var b1=api&&api.b1ContentSnapshot&&api.b1ContentSnapshot();
        var a2=api&&api.a2ContentSnapshot&&api.a2ContentSnapshot();
        var pass=!!(b2&&b2.ok&&b2.lessons===10&&b2.totalTasks===120&&b2.normalTasks===80&&b2.speakingTasks===40&&b1&&b1.ok&&b1.totalTasks===430&&b1.speakingTasks===80&&a2&&a2.ok&&a2.totalTasks===430&&a2.speakingTasks===80);
        tile('Gesamtstatus',pass?'PASS':'FAIL',pass);
        tile('B2 Lektionen',b2?b2.lessons:'-',b2&&b2.lessons===10);
        tile('B2 Aufgaben',b2?b2.totalTasks:'-',b2&&b2.totalTasks===120);
        tile('B2 Speaking',b2?b2.speakingTasks:'-',b2&&b2.speakingTasks===40);
        tile('B1 Regression',b1&&b1.ok?'PASS':'FAIL',b1&&b1.ok&&b1.totalTasks===430);
        tile('A2 Regression',a2&&a2.ok?'PASS':'FAIL',a2&&a2.ok&&a2.totalTasks===430);
        out.textContent=JSON.stringify({pass:pass,b2:b2,b1Regression:{ok:b1&&b1.ok,totalTasks:b1&&b1.totalTasks,speakingTasks:b1&&b1.speakingTasks},a2Regression:{ok:a2&&a2.ok,totalTasks:a2&&a2.totalTasks,speakingTasks:a2&&a2.speakingTasks}},null,2);
      }catch(e){ out.textContent='FAIL: '+(e&&e.stack||e); tile('Gesamtstatus','FAIL',false); }
    })();
  </script>
</body>
</html>
