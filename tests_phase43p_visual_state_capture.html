<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>G54.43.7 Visual-State-Capture Test</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body{font-family:system-ui;margin:20px}.analysis-v2-shell{padding:16px;border:1px solid #ddd;border-radius:12px}.analysis-v2-kpi,.analysis-v2-chart-card,.analysis-v2-bars,.analysis-v2-coach{margin:10px 0;padding:12px;border:1px solid #ccc;border-radius:10px}.bottom-dock{position:fixed;bottom:0;left:0;right:0;height:56px}.dock-item{display:inline-flex;min-width:44px;min-height:44px}.tiny{width:32px;height:32px}
  </style>
</head>
<body>
  <main id="app">
    <section class="analysis-v2-shell" data-analysis-dashboard-v2="true" data-capture-target="analysis">
      <h1>Analyse Dashboard</h1>
      <div class="analysis-v2-kpi">KPI Karte</div>
      <div class="analysis-v2-chart-card"><svg width="180" height="80"><path d="M10 70 L90 30 L170 50"></path></svg></div>
      <div class="analysis-v2-bars">Stärken und Schwächen</div>
      <div class="analysis-v2-coach">Coach Auswertung</div>
      <button class="tiny">K</button>
    </section>
    <nav class="bottom-dock"><button class="dock-item">Home</button></nav>
  </main>
  <script src="./js/qa/egt-visual-state-capture.js"></script>
  <script>
    async function runTest(){
      const api = window.EGTVisualStateCapture;
      if(!api) throw new Error('EGTVisualStateCapture fehlt');
      api.init();
      const cap = await api.captureCurrentState({reason:'test'});
      if(!cap || cap.kind !== 'visual-state-capture') throw new Error('Capture fehlt');
      if(!cap.importantElements.length) throw new Error('importantElements leer');
      if(!cap.touchTargets.length) throw new Error('touchTargets leer');
      document.body.insertAdjacentHTML('beforeend','<pre id="result">PASS G54.43.7 Visual-State-Capture</pre>');
    }
    runTest().catch(err=>document.body.insertAdjacentHTML('beforeend','<pre id="result">FAIL '+err.message+'</pre>'));
  </script>
</body>
</html>
