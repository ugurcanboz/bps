<!doctype html>
<html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>G54.42.9 Analyse KPI Empty-State QA</title></head>
<body><h1>G54.42.9 Analyse KPI-Karten + Empty-State QA</h1>
<pre id="out">läuft…</pre>
<script>
(async function(){
  const checks=[];
  async function txt(path){ return fetch(path).then(r=>r.text()); }
  try{
    const ui=await txt('./js/ui-home-renderer.js');
    const ad=await txt('./js/modules/egt-analysis-data-adapter.js');
    const css=await txt('./css/phase39i-pixel-polish.css');
    const sw=await txt('./service-worker.js');
    checks.push(['Version marker', ui.includes('G54.42.9') && ad.includes('G54.42.9')]);
    checks.push(['KPI real adapter marker', ui.includes('data-analysis-kpis="real-adapter-values"')]);
    checks.push(['Empty state present', ui.includes('analysisV2EmptyStateHtml') && ui.includes('data-analysis-empty-state="true"')]);
    checks.push(['No fake percentages in empty state', ui.includes("scoreValue = data.dataReady ? (score + '%') : '—'") && ui.includes("forecastText = data.dataReady ?"));
    checks.push(['Adapter flags', ad.includes('emptyState: !hasReal') && ad.includes('kpiReady: hasReal')]);
    checks.push(['CSS empty state', css.includes('.analysis-v2-empty') && css.includes('.analysis-v2-data-chip')]);
    checks.push(['Cache updated', sw.includes('egt-trainer-g54-42-9')]);
  }catch(e){ checks.push(['exception', false, e.message]); }
  const passed=checks.every(c=>c[1]);
  document.getElementById('out').textContent=JSON.stringify({phase:'G54.42.9',passed,checks},null,2);
})();
</script></body></html>
