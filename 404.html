<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>BPS-Trainer</title>
<style>body{font-family:Arial,system-ui,sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:#eef3f9;color:#0f172a;padding:24px}.card{max-width:560px;background:white;border-radius:24px;padding:24px;box-shadow:0 20px 60px rgba(15,23,42,.16)}.small{color:#64748b}a{color:#2563eb;font-weight:700}</style>
<script>
(function(){
  function appRoot(){
    var path = window.location.pathname || "/";
    if(/\/404\.html$/i.test(path)) return path.replace(/404\.html$/i, "");
    if(window.location.hostname && /github\.io$/i.test(window.location.hostname)){
      var parts = path.split("/").filter(Boolean);
      return parts.length ? "/" + parts[0] + "/" : "/";
    }
    return path.replace(/\/[^\/]*$/, "/");
  }
  var target = appRoot() + "index.html" + (window.location.search || "") + (window.location.hash || "");
  window.location.replace(target);
})();
</script>
</head>
<body><div class="card"><h1>App wird geladen …</h1><p class="small">BPS-Trainer wird geöffnet.</p><p><a href="./index.html">App öffnen</a></p></div></body>
</html>
