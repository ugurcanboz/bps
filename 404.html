<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Eignungstest-Trainer V7.2.5 · GitHub Pages Fallback</title>
<style>
body{font-family:Arial,system-ui,sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:#eef3f9;color:#0f172a;padding:24px} .card{max-width:560px;background:white;border-radius:24px;padding:24px;box-shadow:0 20px 60px rgba(15,23,42,.16)} .small{color:#64748b} a{color:#2563eb;font-weight:700}
</style>
<script>
(function(){
  "use strict";
  var path = window.location.pathname;
  var isGithub = /(^|\.)github\.io$/i.test(window.location.hostname);
  var base = "/";
  if(isGithub){
    var parts = path.split("/").filter(Boolean);
    base = parts.length ? "/" + parts[0] + "/" : "/";
  }else{
    base = path.replace(/\/[^\/]*$/, "/");
  }
  var target = base + "index.html";
  var original = path + window.location.search + window.location.hash;
  try{ sessionStorage.setItem("trainer-404-original-path", original); }catch(e){}
  window.location.replace(target + "?from404=1&v=7.2.5#start");
})();
</script>
</head>
<body>
  <div class="card">
    <h1>App wird geladen …</h1>
    <p class="small">GitHub Pages Fallback V7.2.5 leitet zurück zur stabilen Startdatei.</p>
    <p><a href="./index.html?v=7.2.5">Falls nichts passiert: App öffnen</a></p>
  </div>
</body>
</html>
