<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>G54.3 CTC Lohr Visual QA</title>
<link rel="stylesheet" href="./css/app.css"><link rel="stylesheet" href="./css/egt-simulation.css"><link rel="stylesheet" href="./css/ctc-flowlogic-integration.css"><link rel="stylesheet" href="./css/ctc-lohr-real-exam.css">
<style>body{background:#07111f;color:#fff;font-family:Arial,sans-serif;padding:18px}.qa-shell{max-width:1120px;margin:0 auto;display:grid;gap:18px}.qa-card{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);border-radius:24px;padding:16px}.qa-grid{display:grid;grid-template-columns:1fr;gap:16px}.qa-title{font-size:28px;font-weight:900}.qa-meta{display:flex;gap:8px;flex-wrap:wrap}.badge{border-radius:999px;background:rgba(91,141,255,.18);padding:6px 10px;font-weight:800}.qa-result{white-space:pre-wrap;font-family:monospace;background:rgba(0,0,0,.3);padding:12px;border-radius:14px}.question{font-size:20px;font-weight:900;margin-bottom:10px}@media(min-width:1000px){.qa-grid{grid-template-columns:1fr 1fr}}</style>
<script>window.CTCFlowLogicAdapter={createQuestion:function(){return {type:"ctcFlowLogic",cat:"CTC-Logik: Wenn-Dann-Ablauf",group:"Logik",block:"6. CTC-Logik: Wenn-Dann-Ablauf",q:"<b>CTC-Logik: Wenn-Dann-Ablauf</b><br><span class=\"small\">Finde die versteckten Fehler.</span>",a:["Ablaufplan"],correct:0,time:780,specialTimeSeconds:780,helpAllowed:false,coachDuring:false,branch:"it",simType:"ctc",poolKey:"it-ctc"};}};</script>
<script src="./js/core/ctc-lohr-exam-structure-engine.js"></script>
</head><body><div class="qa-shell"><div class="qa-title">G54.3 CTC-Lohr Stability · Visual QA</div><div class="qa-meta" id="meta"></div><div class="qa-result" id="result">running…</div><div class="qa-grid"><div id="rule" class="qa-card"></div><div id="letter" class="qa-card"></div><div id="coord" class="qa-card"></div><div id="flow" class="qa-card"></div></div></div>
<script>
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function render(q, host){
  if(q.type==='ctcRuleArithmeticInput') host.innerHTML='<div class="question">'+esc(q.q)+'</div><div class="ctc-lohr-input-panel"><div class="ctc-lohr-task-kicker">Block 3 · kein Bruchstrich · Eingabe</div><div class="ctc-rule-formula">'+esc(q.formula)+'</div><div class="ctc-lohr-rule-box">Regelrechnung als eine Zeile. Antwort: <b>'+esc(q.answer)+'</b></div><input class="ctc-lohr-answer-input" value="'+esc(q.answer)+'"><button class="btn btn-primary ctc-lohr-submit">Antwort werten</button></div>';
  if(q.type==='ctcLetterScanInput') host.innerHTML='<div class="question">'+esc(q.q)+'</div><div class="ctc-lohr-input-panel"><div class="ctc-lohr-task-kicker">Block 4 · Buchstaben zählen</div><div class="ctc-letter-sequence">'+esc(q.sequence)+'</div><div class="ctc-lohr-rule-box">Zielbuchstabe: <b>'+esc(q.targetLetter)+'</b> · Antwort: <b>'+esc(q.answer)+'</b></div><input class="ctc-lohr-answer-input" value="'+esc(q.answer)+'"><button class="btn btn-primary ctc-lohr-submit">Antwort werten</button></div>';
  if(q.type==='ctcCoordinateTableInput') { var cols=q.cols, rows=q.rows, grid=q.grid; var head='<tr><th></th>'+cols.map(c=>'<th>'+c+'</th>').join('')+'</tr>'; var body=rows.map((r,ri)=>'<tr><th>'+r+'</th>'+cols.map((c,ci)=>'<td>'+esc(grid[ri][ci])+'</td>').join('')+'</tr>').join(''); var inputs=q.prompts.map((p,i)=>'<label class="ctc-coordinate-input"><span>'+esc(p.key)+'</span><input value="'+esc(p.answer)+'"></label>').join(''); host.innerHTML='<div class="question">'+esc(q.q)+'</div><div class="ctc-lohr-input-panel"><div class="ctc-lohr-task-kicker">Block 5 · Koordinaten · fehlend = X</div><div class="ctc-table-wrap"><table class="ctc-coordinate-table">'+head+body+'</table></div><div class="ctc-coordinate-grid">'+inputs+'</div><button class="btn btn-primary ctc-lohr-submit">Antworten werten</button></div>'; }
  if(q.type==='ctcFlowLogic') host.innerHTML='<div class="question">'+q.q+'</div><div class="ctc-flowlogic-intro"><div class="ctc-flowlogic-title"><span>⚡</span><div><b>CTC-Logik: Wenn-Dann-Ablauf</b><small>13 Minuten · nur IT/FISI → CTC</small></div></div><div class="ctc-flowlogic-rules"><div><b>▭ Handlung</b><span>Quadrat/Rechteck</span></div><div><b>◇ Frage</b><span>Raute</span></div><div><b>Ja/Nein</b><span>Pfeile</span></div></div></div>';
}
var profile={branch:'it',simType:'ctc',mode:'ctcLohr',poolKey:'it-ctc'};
var E=window.EGTCTCLohrExamStructureEngine; var qs=E.createExam({questionProfile:profile,mode:'ctcLohr'});
var qRule=qs.find(q=>q.type==='ctcRuleArithmeticInput'), qLetter=qs.find(q=>q.type==='ctcLetterScanInput'), qCoord=qs.find(q=>q.type==='ctcCoordinateTableInput'), qFlow=qs.find(q=>q.type==='ctcFlowLogic');
render(qRule,document.getElementById('rule')); render(qLetter,document.getElementById('letter')); render(qCoord,document.getElementById('coord')); render(qFlow,document.getElementById('flow'));
document.getElementById('meta').innerHTML='<span class="badge">Fragen: '+qs.length+'</span><span class="badge">Dauer: '+E.totalSeconds()+' s</span><span class="badge">FlowLogic: '+(qFlow&&qFlow.time)+' s</span><span class="badge">Scope: it-ctc</span>';
var failures=[]; if(qs.length!==62) failures.push('count'); if(E.totalSeconds()!==1978) failures.push('time'); if(!qRule.formula || qRule.formula.indexOf('/')<0 || qRule.formula.indexOf('\n')>=0) failures.push('rule-inline'); if(qRule.a.length!==1) failures.push('rule-not-input'); if(qFlow.time!==780) failures.push('flow-time'); if(E.createQuestion({index:0,questionProfile:{branch:'it',simType:'bps',mode:'bps',poolKey:'it-bps'}})!==null) failures.push('scope-bps');
setTimeout(function(){ var overflow=Math.max(0,document.documentElement.scrollWidth-window.innerWidth); document.getElementById('result').textContent=JSON.stringify({ok:failures.length===0,failures:failures,overflow:overflow,diagnostics:E.diagnostics()},null,2); document.body.dataset.qaOk=failures.length===0 && overflow===0 ? 'true':'false'; },100);
</script></body></html>
