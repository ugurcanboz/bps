<!doctype html><html lang="de"><head><meta charset="utf-8"><title>Phase 43C · iPhone Portrait Visual Scroll QA</title></head><body><pre id="out">running...</pre><script>
(async function(){
  const out=document.getElementById('out');
  const results=[];
  function add(name, ok, detail){results.push({name, ok:!!ok, detail:detail||''});}
  async function txt(path){const r=await fetch(path,{cache:'no-store'}); return r.ok?await r.text():'';}
  try{
    const css=await txt('./css/phase39i-pixel-polish.css');
    const app=await txt('./js/core/app-config.js');
    const sw=await txt('./service-worker.js');
    const manifest=JSON.parse(await txt('./manifest.json'));
    const update=JSON.parse(await txt('./update-check.json'));
    add('Version G54.42.3', app.includes("var VERSION = 'G54.42.3'"));
    add('Manifest G54.42.3', manifest.version==='G54.42.3', manifest.version);
    add('Update-Check G54.42.3', String(update.version||'').startsWith('G54.42.3'), update.version);
    add('Service Worker Cache G54.42.3', sw.includes('egt-trainer-g54-42-3'));
    add('iPhone Portrait Media Query vorhanden', css.includes('@media (max-width: 560px) and (orientation: portrait)'));
    add('Training Icons absolute zentriert', css.includes('.ui-training-area-card .ui-area-icon') && css.includes('top: 50%') && css.includes('translate3d(0, -50%, 0)'));
    add('Training Text Abstand links stabil', css.includes('padding: 20px 58px 20px 106px'));
    add('Deep Sheet Flex-Scroll aktiv', css.includes('display: flex !important') && css.includes('flex-direction: column !important'));
    add('Deep Body iOS Native Scroll', css.includes('-webkit-overflow-scrolling: touch') && css.includes('overflow-y: auto !important'));
    add('Unterer Startbutton Safe-Area', css.includes('product-training-startbox') && css.includes('env(safe-area-inset-bottom'));
  }catch(e){add('Runner error', false, e.message||String(e));}
  const passed=results.every(r=>r.ok);
  out.textContent=JSON.stringify({phase:'43C',passed,checks:results.length,results},null,2);
})();
</script></body></html>
