<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Phase 31D QA – A2 Gesamt-QA + Device Simulation</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0b1020;color:#eef3ff;margin:0;padding:24px;line-height:1.5}
    .card{max-width:1100px;margin:auto;background:#141b33;border:1px solid rgba(255,255,255,.14);border-radius:18px;padding:22px;box-shadow:0 18px 60px rgba(0,0,0,.25)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin:16px 0}.box{background:#0b1224;border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:14px}
    pre{background:#070b16;border-radius:12px;padding:16px;overflow:auto;max-height:58vh}.pass{color:#6ee7b7}.fail{color:#fca5a5}.warn{color:#fbbf24}.muted{color:#a7b1c8}
    button{background:#2563eb;color:white;border:0;border-radius:12px;padding:10px 14px;font-weight:700;margin:4px;cursor:pointer}button:hover{filter:brightness(1.08)}
  </style>
</head>
<body>
  <main class="card">
    <h1>Phase 31D QA</h1>
    <p>A2 Gesamtprüfung: Aufgabenanzahl, Speaking-Anteil, Task-Integrität, Pflichtfelder, Typabdeckung und Geräte-Readiness.</p>
    <div class="grid" id="summary"></div>
    <p>
      <button onclick="runQa()">QA erneut ausführen</button>
      <button onclick="tryOpenA2()">A2 öffnen</button>
      <button onclick="tryOpenLastLesson()">Lektion 10 öffnen</button>
    </p>
    <pre id="out">Warte auf App...</pre>
  </main>
  <script src="js/i18n/language-store.js"></script>
  <script src="js/i18n/language-adapter.js"></script>
  <script src="js/modules/language-adaptive-engine.js"></script>
  <script src="js/modules/language-course-cloud-sync.js"></script>
  <script src="js/modules/language-course-entry-module.js"></script>
  <script>
    function card(label,value,cls){ return '<div class="box"><b>'+label+'</b><br><span class="'+(cls||'')+'">'+value+'</span></div>'; }
    function line(txt,ok){return (ok?'✅ ':'❌ ')+txt;}
    function tryOpenA2(){ try{ window.LanguageAcademyCourseEntry.openLevel('a2'); }catch(e){ alert(e.message); } }
    function tryOpenLastLesson(){ try{ window.LanguageAcademyCourseEntry.openLesson('a2','a2-opinions-plans'); }catch(e){ alert(e.message); } }
    function runQa(){
      var out=document.getElementById('out'), summary=document.getElementById('summary');
      var api=window.LanguageAcademyCourseEntry;
      var snap=api&&api.phase31dQaSnapshot&&api.phase31dQaSnapshot();
      var a2=api&&api.a2ContentSnapshot&&api.a2ContentSnapshot();
      var ua=navigator.userAgent;
      var checks=[];
      checks.push(['API vorhanden', !!api]);
      checks.push(['phase31dQaSnapshot vorhanden', !!(api&&api.phase31dQaSnapshot)]);
      checks.push(['Phase 31D QA ok', !!snap && snap.ok===true]);
      checks.push(['A2 10 Lektionen', !!a2 && a2.lessons===10]);
      checks.push(['A2 430 Aufgaben', !!a2 && a2.totalTasks===430]);
      checks.push(['A2 350 normale Aufgaben', !!a2 && a2.normalTasks===350]);
      checks.push(['A2 80 Sprechaufgaben', !!a2 && a2.speakingTasks===80]);
      checks.push(['Keine doppelten Task-IDs', !!snap && snap.duplicateIds.length===0]);
      checks.push(['Keine fehlenden Pflichtfelder', !!snap && snap.missingFields.length===0]);
      checks.push(['Speaking-Fallback bereit', !!snap && snap.speakingFallbackReady===true]);
      var ok=checks.every(function(c){return c[1];});
      summary.innerHTML=card('Status',ok?'PASS':'FAIL',ok?'pass':'fail')+card('A2 Aufgaben',a2?a2.totalTasks:'-', 'pass')+card('Speaking',a2?a2.speakingTasks:'-', 'pass')+card('Gerät/Browser',ua.slice(0,90)+'...', 'muted');
      out.className=ok?'pass':'fail';
      out.textContent=checks.map(function(c){return line(c[0],c[1]);}).join('\n')+'\n\nPhase31D Snapshot:\n'+JSON.stringify(snap,null,2);
    }
    setTimeout(runQa,250);
  </script>
</body>
</html>
