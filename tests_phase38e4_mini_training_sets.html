<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Phase 38E.4 · Mini-Übungssets QA</title>
  <link rel="stylesheet" href="css/language-course.css">
</head>
<body>
  <main class="la-dashboard" style="padding:20px;max-width:1100px;margin:auto;">
    <section class="la-card">
      <span class="la-section-kicker">Phase 38E.4</span>
      <h1>Trainingsmodus mit echten Mini-Übungssets</h1>
      <p>Diese Testseite prüft, ob der Trainingsmodus konkrete Mini-Aufgaben pro Schwäche erzeugt.</p>
      <div id="qa-output" class="la-exam-warning">QA wird beim Laden ausgeführt.</div>
      <div id="qa-preview"></div>
    </section>
  </main>
  <script src="data/language-exam-blueprints.js"></script>
  <script src="data/language-level-difficulty-rules.js"></script>
  <script src="data/language-b1-exam-pilot.js"></script>
  <script src="data/language-b2-exam-pilot.js"></script>
  <script src="js/modules/language-exam-engine.js"></script>
  <script src="js/modules/language-exam-shell.js"></script>
  <script>
    (function(){
      var out = document.getElementById('qa-output');
      var preview = document.getElementById('qa-preview');
      var shell = window.LanguageExamShell;
      var ok = !!(shell && shell.diagnostics && shell.buildWeaknessProfile && shell.miniTrainingSetFor && shell.miniTrainingSetHtml);
      var diag = ok ? shell.diagnostics() : null;
      var profile = ok ? shell.buildWeaknessProfile('B2', { level:'B2', completedParts:5, partScores:{ reading:82, listening:42, grammar:58, writing:66, speaking:61 } }) : null;
      var weakest = profile && profile.priority && profile.priority[0];
      var set = ok ? shell.miniTrainingSetFor('B2', weakest ? weakest.part : 'listening', weakest ? weakest.band : 'critical') : null;
      var fakeSession = { status:'training', level:'B2', trainingFocus:{ level:'B2', part:set ? set.part : 'listening', label:set ? set.label : 'Hören', band:set ? set.band : 'critical', miniSet:set } };
      var html = ok ? shell.miniTrainingSetHtml(fakeSession) : '';
      var hasTasks = set && set.tasks && set.tasks.length >= 3;
      var hasSolution = html.indexOf('Musterlösung') >= 0 && html.indexOf('la-mini-training-task') >= 0;
      var featureOk = diag && diag.features && diag.features.indexOf('real mini exercise sets per weakness') >= 0;
      var phaseOk = diag && diag.phase === '38E.4';
      preview.innerHTML = html;
      out.innerHTML = '<b>'+(ok && phaseOk && featureOk && hasTasks && hasSolution ? 'BESTANDEN' : 'FEHLER')+'</b><br>'+
        'Phase: '+(diag ? diag.phase : 'n/a')+'<br>'+
        'Schwächster Teil: '+(weakest ? weakest.label : 'n/a')+'<br>'+
        'Mini-Aufgaben: '+(hasTasks ? set.tasks.length : 0)+'<br>'+
        'Musterlösung/Checkliste: '+(hasSolution ? 'vorhanden' : 'fehlt');
    })();
  </script>
</body>
</html>
