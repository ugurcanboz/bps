<!doctype html>
<html lang="de">
<head><meta charset="utf-8"><title>Phase 43V · Deep-Sheet Scroll Intelligence QA</title></head>
<body>
<h1>G54.43.8E · Deep-Sheet Scroll Intelligence QA</h1>
<pre id="out">läuft...</pre>
<script>
(async function(){
  const files = ['./js/qa/egt-visual-state-capture.js','./index.html','./css/phase43s-iphone-scroll-qa-bubble.css'];
  const results=[];
  async function txt(path){ const r=await fetch(path,{cache:'no-store'}); return r.text(); }
  const qa=await txt(files[0]);
  const index=await txt(files[1]);
  function check(name, ok){ results.push({name, ok:!!ok}); }
  check('Version G54.43.8E im Capture-Modul', qa.includes("var VERSION = 'G54.43.8E'"));
  check('Deep-Sheet Intelligence-Funktion vorhanden', qa.includes('function collectDeepSheetIntelligence'));
  check('Aktiver Deep-Sheet-Kontext wird erkannt', qa.includes('function detectActiveContext'));
  check('Primary Scrollcontainer wird ermittelt', qa.includes('primaryScrollContainer'));
  check('Scrollfähigkeit maxScrollY/bottomGap wird gemessen', qa.includes('maxScrollY') && qa.includes('bottomGap'));
  check('Dock-Overlap-Prüfung vorhanden', qa.includes('collectDockOverlap') && qa.includes('overlapsDock'));
  check('QA-Overlay-vs-Sheet-Overlap wird erfasst', qa.includes('qaOverlay') && qa.includes('overlapsActiveSheet'));
  check('DeepSheet wird im JSON-Capture exportiert', qa.includes('deepSheet: collectDeepSheetIntelligence()'));
  check('Render-Ausgabe zeigt Deep-Sheet Scroll-Analyse', qa.includes('DEEP-SHEET') && qa.includes('Scroll-Analyse'));
  check('Score bewertet Deep-Sheet Scrollcontainer', qa.includes('Deep-Sheet aktiv, aber kein Scrollcontainer erkannt'));
  check('Index-Version aktualisiert', index.includes('G54.43.8E-2026-06-22'));
  const pass=results.every(r=>r.ok);
  document.getElementById('out').textContent=JSON.stringify({pass,results},null,2);
  if(!pass) throw new Error('Phase 43V QA fehlgeschlagen');
})();
</script>
</body>
</html>
