<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Phase 38C.10 · B1 Sprechprüfung hart</title>
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/language-course.css">
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:18px;background:#f8fafc;color:#0f172a}
    .box{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:16px;margin:12px 0;box-shadow:0 10px 25px rgba(15,23,42,.06)}
    button{border:0;border-radius:12px;padding:10px 14px;font-weight:800;margin:4px;background:#111827;color:white}
    pre{white-space:pre-wrap;background:#0f172a;color:#e5e7eb;border-radius:12px;padding:12px;overflow:auto}
    textarea{width:100%;min-height:130px;border-radius:12px;border:1px solid #cbd5e1;padding:12px}
  </style>
</head>
<body>
  <h1>Phase 38C.10 · B1 Sprechprüfung hart</h1>
  <p>Testet Sprechpool, lokale harte Sprechbewertung und bestätigtes Transkript.</p>

  <div class="box">
    <button onclick="diagnose()">Diagnose starten</button>
    <button onclick="good()">Gute Antwort testen</button>
    <button onclick="shortAnswer()">Kurzantwort testen</button>
    <button onclick="keywordsOnly()">Stichwörter testen</button>
    <button onclick="offTopic()">Off-Topic testen</button>
    <button onclick="openExam()">Exam Shell öffnen</button>
  </div>

  <div class="box">
    <textarea id="txt">Hallo zusammen, ich möchte gerne eine Lerngruppe organisieren, weil wir uns besser auf die B1 Prüfung vorbereiten können. Mein Vorschlag ist, dass wir uns am Mittwoch um 18 Uhr in der Stadtbibliothek treffen. Dort ist es ruhig und jeder kann seine Aufgaben mitbringen. Wir können gemeinsam Grammatik üben und Sprechen trainieren. Passt euch dieser Termin oder soll ich einen anderen Ort vorschlagen? Bitte gebt mir kurz Rückmeldung. Vielen Dank und bis bald.</textarea>
    <button onclick="assessText()">Text lokal bewerten</button>
  </div>

  <pre id="out">Bereit.</pre>

  <script src="data/language-exam-blueprints.js"></script>
  <script src="data/language-ai-config.js"></script>
  <script src="data/language-b1-exam-pilot.js"></script>
  <script src="js/modules/language-speaking-ai-client.js"></script>
  <script src="js/modules/language-exam-engine.js"></script>
  <script src="js/modules/language-exam-shell.js"></script>
  <script>
    function out(x){ document.getElementById('out').textContent = typeof x === 'string' ? x : JSON.stringify(x,null,2); }
    function currentTask(){ return window.LanguageB1ExamPilot.buildAttempt('phase38c10-test').speaking; }
    function diagnose(){
      var info = window.LanguageB1ExamPilot.poolInfo();
      var diag = window.LanguageExamShell.diagnose();
      out({ pool:info, shell:diag, task:currentTask() });
    }
    function assess(value){
      var task = currentTask();
      var result = window.LanguageExamEngine.localAssessResponse({ level:'B1', part:'speaking', task:task, userText:value });
      out(result);
    }
    function assessText(){ assess(document.getElementById('txt').value); }
    function good(){
      document.getElementById('txt').value = 'Hallo zusammen, ich möchte gerne eine Lerngruppe organisieren, weil wir uns besser auf die B1 Prüfung vorbereiten können. Mein Vorschlag ist, dass wir uns am Mittwoch um 18 Uhr in der Stadtbibliothek treffen. Dort ist es ruhig und jeder kann seine Aufgaben mitbringen. Wir können gemeinsam Grammatik üben und Sprechen trainieren. Passt euch dieser Termin oder soll ich einen anderen Ort vorschlagen? Bitte gebt mir kurz Rückmeldung. Vielen Dank und bis bald.';
      assessText();
    }
    function shortAnswer(){
      document.getElementById('txt').value = 'Termin geht nicht. Freitag? Danke.';
      assessText();
    }
    function keywordsOnly(){
      document.getElementById('txt').value = 'Arzt. Termin. Morgen. Behörde. Freitag. Danke.';
      assessText();
    }
    function offTopic(){
      document.getElementById('txt').value = 'Ich spiele gerne Fußball und esse Pizza. Am Wochenende höre ich Musik und treffe Freunde.';
      assessText();
    }
    function openExam(){
      try{ window.LanguageExamShell.open(); }
      catch(e){ out('Exam Shell konnte nicht geöffnet werden: '+e.message); }
    }
  </script>
</body>
</html>
