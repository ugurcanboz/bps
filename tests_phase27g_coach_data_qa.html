<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Phase 27G Coach Data QA</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0b1220;color:#e5edf7;padding:24px;line-height:1.5}
    .pass{color:#8ef0b2}.fail{color:#ff9b9b}pre{background:#111827;padding:16px;border-radius:12px;white-space:pre-wrap}
  </style>
</head>
<body>
  <h1>Phase 27G – Coach Data QA</h1>
  <div id="out">Prüfe…</div>
  <script>
    async function run(){
      const out=document.getElementById('out');
      const source=await fetch('js/modules/language-course-entry-module.js').then(r=>r.text());
      const checks=[
        ['Phase 27G Version gesetzt', /phase27g-coach-data-qa-v1/.test(source)],
        ['coachQaSnapshot vorhanden', /function coachQaSnapshot\(\)/.test(source)],
        ['coachQaSnapshot exportiert', /coachQaSnapshot:coachQaSnapshot/.test(source)],
        ['Diagnostics enthält Coach-QA', /coachQa:coachQaSnapshot\(\)/.test(source)],
        ['Fehlerdaten werden genutzt', /collectWrongTasks\(\)/.test(source)],
        ['Vokabeldaten werden genutzt', /vocabStats\(\)/.test(source) && /dueVocabularyItems\(\)/.test(source)],
        ['Aufgabentypanalyse vorhanden', /coachTaskTypeBreakdown\(wrong\)/.test(source)],
        ['Lektionsanalyse vorhanden', /coachLessonBreakdown\(wrong\)/.test(source)],
        ['Startaktionen vorhanden', /startCoachRecommendation/.test(source) && /language-course-coach-start/.test(source)],
        ['Fallback vorhanden', /language-course-continue/.test(source)]
      ];
      const ok=checks.every(x=>x[1]);
      out.innerHTML='<h2 class="'+(ok?'pass':'fail')+'">'+(ok?'PASS':'FAIL')+'</h2><pre>'+checks.map(x=>(x[1]?'✅ ':'❌ ')+x[0]).join('\n')+'</pre>';
      document.body.dataset.phase27g=ok?'pass':'fail';
    }
    run().catch(e=>{document.getElementById('out').innerHTML='<h2 class="fail">FAIL</h2><pre>'+String(e)+'</pre>';});
  </script>
</body>
</html>
