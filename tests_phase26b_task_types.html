<!doctype html><meta charset="utf-8"><title>Phase 26B Task Types</title><pre id="out"></pre><script src="./js/modules/language-course-entry-module.js"></script><script>
const out=document.getElementById('out');
const api=window.LanguageAcademyCourseEntry;
const d=api&&api.diagnostics?api.diagnostics():{};
const checks=[
 ['api exists',!!api],['phase 26B',d.phase==='26B'],['levels',d.levels>=6],['entry callable',typeof api.open==='function']
