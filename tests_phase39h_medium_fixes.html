<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Phase 39H Medium Fixes QA</title>
<link rel="stylesheet" href="./css/app.css"><link rel="stylesheet" href="./css/ui-foundation.css"><link rel="stylesheet" href="./css/ui-nav-foundation.css"><link rel="stylesheet" href="./css/egt-gate.css"><link rel="stylesheet" href="./css/phase39h-medium-fixes.css">
<style>body{font-family:system-ui;background:#020617;color:#e5e7eb;padding:24px;line-height:1.5}.card{background:#0f172a;border:1px solid #334155;border-radius:16px;padding:16px;margin:12px 0}.ok{color:#22c55e}.bad{color:#ef4444}code{background:#111827;border-radius:8px;padding:2px 6px}</style></head><body>
<h1>Phase 39H – Medium Fixes QA</h1><div id="out" class="card">Prüfe CSS-Regeln …</div>
<script>
(function(){
  const checks = [];
  function hasSheet(name){ return Array.from(document.styleSheets).some(s => (s.href||'').includes(name)); }
  checks.push(['phase39h CSS geladen', hasSheet('phase39h-medium-fixes.css')]);
  const probe = document.createElement('div');
  probe.id = 'uiHomeViewport';
  probe.style.cssText = 'position:absolute;left:-9999px;top:-9999px;width:320px;height:100px;overflow:auto';
  document.body.classList.add('ui-f-ui-home-ready');
  document.body.appendChild(probe);
  const cs = getComputedStyle(probe);
  checks.push(['Dock-Reserve aktiv', parseFloat(cs.paddingBottom) >= 120]);
  checks.push(['Scroll-Padding gesetzt', getComputedStyle(document.documentElement).scrollPaddingBottom !== 'auto']);
  probe.remove();
  const ok = checks.every(x => x[1]);
  document.getElementById('out').innerHTML = '<h2 class="'+(ok?'ok':'bad')+'">'+(ok?'Bestanden':'Fehler')+'</h2>' + checks.map(x => '<p class="'+(x[1]?'ok':'bad')+'">'+(x[1]?'✓':'✗')+' '+x[0]+'</p>').join('');
})();
</script></body></html>
