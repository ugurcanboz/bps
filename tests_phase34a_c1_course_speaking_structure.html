<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Phase 34A · C1 Course + Speaking Structure QA</title>
  <style>body{font-family:Arial,sans-serif;background:#0b1220;color:#e5edf8;margin:0;padding:20px} .card{background:#111b2e;border:1px solid #263850;border-radius:16px;padding:16px;margin:12px 0}.pass{color:#50fa7b}.fail{color:#ff6b6b}pre{white-space:pre-wrap;background:#07101f;padding:12px;border-radius:10px;overflow:auto}</style>
</head>
<body>
  <h1>Phase 34A · C1 Kursstruktur + Speaking-Struktur</h1>
  <div id="result" class="card">Test läuft…</div>
  <script src="js/modules/language-course-entry-module.js"></script>
  <script>
    (function(){
      const out=document.getElementById('result');
      const api=window.LanguageAcademyCourseEntry;
      const errors=[];
      if(!api) errors.push('LanguageAcademyCourseEntry fehlt');
      const c1=api&&api.c1StructureSnapshot?api.c1StructureSnapshot():null;
      const diag=api&&api.diagnostics?api.diagnostics():null;
      if(!c1||!c1.ok) errors.push('C1 Snapshot nicht OK');
      if(c1&&c1.phase!=='34A') errors.push('Phase ist nicht 34A');
      if(c1&&(c1.lessons!==10||c1.totalTasks!==120||c1.normalTasks!==80||c1.speakingTasks!==40)) errors.push('C1 Mengen stimmen nicht');
      if(c1){Object.keys(c1.perLesson||{}).forEach(function(id){const row=c1.perLesson[id]; if(!row.ok||row.tasks!==12||row.speakingTasks!==4||!row.parallelSpeaking) errors.push('Lesson fehlerhaft: '+id);});}
      if(!diag||diag.phase!=='34A'||!diag.c1Structure||!diag.c1Structure.ok) errors.push('Diagnostics fehlen/fehlerhaft');
      out.innerHTML='<h2 class="'+(errors.length?'fail':'pass')+'">'+(errors.length?'FAIL':'PASS')+'</h2><pre>'+JSON.stringify({errors,c1,diagnostics:{phase:diag&&diag.phase,version:diag&&diag.version,hasC1Structure:!!(diag&&diag.c1Structure)}},null,2)+'</pre>';
    })();
  </script>
</body>
</html>
