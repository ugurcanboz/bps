<!doctype html>
<html lang="de">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Phase 33C B2 Content + Speaking QA</title>
<style>body{font-family:Arial,sans-serif;background:#101826;color:#eef;padding:18px}.ok{color:#64d991}.bad{color:#ff7a7a}.card{border:1px solid #334;padding:12px;border-radius:12px;margin:10px 0;background:#172235}code{color:#b9d7ff}</style></head>
<body>
<h1>Phase 33C – B2 Lessons 6–10 Content + Speaking QA</h1>
<div id="out">Lade Test…</div>
<script src="js/modules/language-course-entry-module.js"></script>
<script>
(function(){
  function line(ok,msg){return '<div class="'+(ok?'ok':'bad')+'">'+(ok?'PASS ':'FAIL ')+msg+'</div>';}
  var out=document.getElementById('out');
  try{
    var api=window.LanguageAcademyCourseEntry;
    var b2=api&&api.b2ContentSnapshot&&api.b2ContentSnapshot();
    var b1=api&&api.b1ContentSnapshot&&api.b1ContentSnapshot();
    var a2=api&&api.a2ContentSnapshot&&api.a2ContentSnapshot();
    var html='<div class="card">';
    html+=line(!!api,'API vorhanden');
    html+=line(b2&&b2.phase==='33C','Phase 33C');
    html+=line(b2&&b2.ok,'B2 Snapshot ok');
    html+=line(b2&&b2.lessons===10,'10 B2-Lektionen');
    html+=line(b2&&b2.expandedLessons===10,'10 ausgebaute B2-Lektionen');
    html+=line(b2&&b2.starterLessons===0,'0 Starter-Lektionen übrig');
    html+=line(b2&&b2.totalTasks===430,'430 B2-Aufgaben');
    html+=line(b2&&b2.normalTasks===350,'350 B2-Normalaufgaben');
    html+=line(b2&&b2.speakingTasks===80,'80 B2-Sprechaufgaben');
    html+=line(b1&&b1.ok&&b1.totalTasks===430&&b1.speakingTasks===80,'B1 Regression ok');
    html+=line(a2&&a2.ok&&a2.totalTasks===430&&a2.speakingTasks===80,'A2 Regression ok');
    html+='</div><pre>'+JSON.stringify({b2:b2,b1:{ok:b1&&b1.ok,total:b1&&b1.totalTasks,speaking:b1&&b1.speakingTasks},a2:{ok:a2&&a2.ok,total:a2&&a2.totalTasks,speaking:a2&&a2.speakingTasks}},null,2)+'</pre>';
    out.innerHTML=html;
  }catch(e){out.innerHTML='<div class="bad">FAIL '+e.message+'</div><pre>'+e.stack+'</pre>';}
})();
</script>
</body></html>
