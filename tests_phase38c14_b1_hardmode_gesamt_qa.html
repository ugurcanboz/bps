<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Phase 38C.14 · B1 Hardmode Gesamt-QA</title>
  <link rel="stylesheet" href="css/language-course.css">
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#071226;color:#eaf2ff;padding:24px;line-height:1.45}
    .box{background:#0f1d34;border:1px solid rgba(125,170,255,.35);border-radius:20px;padding:18px;margin:14px 0;box-shadow:0 18px 60px rgba(0,0,0,.25)}
    .ok{color:#86efac}.bad{color:#fca5a5}.warn{color:#fde68a}
    button{background:#2563eb;color:white;border:0;border-radius:14px;padding:12px 18px;font-weight:900;cursor:pointer}
    table{width:100%;border-collapse:collapse;margin-top:12px;background:#0a1427;border-radius:14px;overflow:hidden}
    th,td{padding:10px;border-bottom:1px solid rgba(148,163,184,.18);text-align:left;font-size:14px}
    th{color:#bfdbfe;background:#111f39} pre{white-space:pre-wrap;background:#050b16;border-radius:14px;padding:12px;color:#dbeafe;overflow:auto}
  </style>
</head>
<body>
  <h1>Phase 38C.14 · B1 Hardmode Gesamt-QA</h1>
  <p>Validiert die komplette B1-Prüfung mit Lesen, Hören, Grammatik & Sprachbausteine, Schreiben und Sprechen.</p>
  <button onclick="run()">Gesamt-QA starten</button>
  <div id="out" class="box">Noch nicht gestartet.</div>

  <script src="data/language-exam-blueprints.js"></script>
  <script src="data/language-b1-exam-pilot.js"></script>
  <script src="data/language-b2-exam-pilot.js"></script>
  <script src="js/modules/language-ai-client.js"></script>
  <script src="js/modules/language-speaking-ai-client.js"></script>
  <script src="js/modules/language-exam-engine.js"></script>
  <script src="js/modules/language-exam-shell.js"></script>
  <script>
    function line(ok,msg,warn){return '<p class="'+(ok?'ok':(warn?'warn':'bad'))+'">'+(ok?'✅ ':warn?'⚠️ ':'❌ ')+msg+'</p>'}
    function esc(v){return String(v==null?'':v).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}
    function run(){
      var out=document.getElementById('out');
      var html='';
      try{
        var engine=window.LanguageExamEngine;
        var shell=window.LanguageExamShell;
        var bp=window.LanguageExamBlueprints && LanguageExamBlueprints.get('B1');
        var pool=window.LanguageB1ExamPilot && LanguageB1ExamPilot.poolInfo();
        var shellDiag=shell && shell.diagnostics ? shell.diagnostics() : null;
        var qa=engine && engine.validateB1HardmodeTotalQa ? engine.validateB1HardmodeTotalQa() : null;
        html+=line(!!engine,'LanguageExamEngine geladen');
        html+=line(!!shell,'LanguageExamShell geladen');
        html+=line(!!bp && !!bp.parts.grammar,'B1 Blueprint enthält Grammatik & Sprachbausteine');
        html+=line(!!pool && pool.grammar>=3,'B1 Grammatikpool aktiv: '+(pool&&pool.grammar)+' Varianten');
        html+=line(!!shellDiag && shellDiag.phase==='38C.14','Shell-Diagnose Phase 38C.14 aktiv');
        html+=line(!!qa && qa.ok,'B1 Hardmode Gesamt-QA bestanden');
        if(qa){
          html+='<h2>Szenarien</h2><table><thead><tr><th>Szenario</th><th>Erwartet</th><th>Aktuell</th><th>Parts</th><th>Status</th></tr></thead><tbody>';
          (qa.validation.scenarios||[]).forEach(function(s){
            html+='<tr><td>'+esc(s.scenario)+'</td><td>'+esc(s.expected)+'</td><td>'+esc(s.actual)+'</td><td>'+esc(s.completedParts)+'/'+esc(s.totalParts)+'</td><td>'+(s.ok?'✅':'❌')+'</td></tr>';
          });
          html+='</tbody></table>';
          html+='<h2>Checks</h2>'+(qa.checks||[]).map(function(c){return line(c.ok,c.name)}).join('');
          html+='<pre>'+esc(JSON.stringify(qa,null,2))+'</pre>';
        }
      }catch(e){
        html+=line(false,e && e.message ? e.message : String(e));
      }
      out.innerHTML=html;
    }
    run();
  </script>
</body>
</html>
