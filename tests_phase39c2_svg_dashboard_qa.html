<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Phase 39C.2 · SVG Dashboard QA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#0f172a;color:#f8fafc;margin:0;padding:24px;line-height:1.5}
    main{max-width:1100px;margin:auto}
    .card{border:1px solid rgba(148,163,184,.25);background:rgba(15,23,42,.8);border-radius:22px;padding:18px;margin:14px 0}
    .ok{color:#22c55e}.bad{color:#ef4444}.warn{color:#f59e0b}
    code{background:rgba(255,255,255,.08);padding:2px 6px;border-radius:8px}
    table{width:100%;border-collapse:collapse;margin-top:10px}
    th,td{border-bottom:1px solid rgba(148,163,184,.22);padding:8px;text-align:left;font-size:14px}
    button{min-height:44px;border-radius:14px;border:1px solid rgba(96,165,250,.35);background:rgba(59,130,246,.15);color:#fff;padding:0 14px;font-weight:800}
  </style>
</head>
<body>
<main>
  <h1>Phase 39C.2 · SVG Dashboard Browser QA</h1>
  <p>Diese Testdatei prüft im Browser, ob Dashboard-/Deep-Sheet-Icons als SVG gerendert werden und ob Hauptbuttons ausreichend groß sind.</p>
  <button id="run">QA erneut ausführen</button>
  <div id="result" class="card">Warte auf Testlauf…</div>
</main>
<script>
(function(){
  const ACTIONS = [
    'simulation-center','training-center','analysis','coach','python-quest',
    'language-course-open','more-menu','branch-training'
  ];
  const EMOJI_RE = /[\u{1F300}-\u{1FAFF}\u2600-\u27BF]/u;
  function visible(el){
    const r=el.getBoundingClientRect();
    const cs=getComputedStyle(el);
    return r.width>0 && r.height>0 && cs.display!=='none' && cs.visibility!=='hidden';
  }
  function run(){
    const res = {
      time:new Date().toISOString(),
      svgCount:document.querySelectorAll('svg').length,
      dashboardEmojiNodes:[],
      missingActions:[],
      smallButtons:[],
      iconContainersWithoutSvg:[],
      overflowX:document.documentElement.scrollWidth-window.innerWidth
    };
    document.querySelectorAll('.ui-area-icon,.ui-quick-icon,.ui-sim-hero-icon,.ui-deep-card-icon,.ui-mod-icon').forEach(el=>{
      if(!visible(el)) return;
      const t=(el.textContent||'').trim();
      if(t && EMOJI_RE.test(t)) res.dashboardEmojiNodes.push(t);
      if(!el.querySelector('svg,img')) res.iconContainersWithoutSvg.push({cls:el.className,text:t});
    });
    ACTIONS.forEach(a=>{
      if(!document.querySelector('[data-ui-action="'+a+'"]')) res.missingActions.push(a);
    });
    document.querySelectorAll('button').forEach(btn=>{
      if(!visible(btn)) return;
      const r=btn.getBoundingClientRect();
      if(r.width<44 || r.height<44) res.smallButtons.push({
        text:(btn.innerText||btn.getAttribute('aria-label')||btn.dataset.uiAction||'').trim().slice(0,80),
        w:Math.round(r.width),h:Math.round(r.height),
        action:btn.dataset.uiAction||''
      });
    });
    const ok = res.svgCount>20 && res.dashboardEmojiNodes.length===0 && res.missingActions.length===0 && res.smallButtons.length===0 && res.overflowX<=1;
    const html = [
      '<h2 class="'+(ok?'ok':'bad')+'">'+(ok?'BESTANDEN':'PRÜFEN')+'</h2>',
      '<table><tr><th>Check</th><th>Wert</th></tr>',
      '<tr><td>SVG-Anzahl</td><td>'+res.svgCount+'</td></tr>',
      '<tr><td>Emoji in sichtbaren Icon-Containern</td><td>'+res.dashboardEmojiNodes.length+'</td></tr>',
      '<tr><td>Fehlende Hauptaktionen</td><td>'+res.missingActions.join(', ')+'</td></tr>',
      '<tr><td>Buttons unter 44px</td><td>'+res.smallButtons.length+'</td></tr>',
      '<tr><td>Horizontaler Overflow</td><td>'+res.overflowX+'</td></tr>',
      '</table>',
      '<pre>'+JSON.stringify(res,null,2)+'</pre>'
    ].join('');
    document.getElementById('result').innerHTML=html;
    window.__PHASE39C2_QA_RESULT__=res;
  }
  document.getElementById('run').addEventListener('click', run);
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', run); else run();
})();
</script>
</body>
</html>
