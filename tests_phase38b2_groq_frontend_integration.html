<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Phase 38B.2 · Groq Frontend Integration Test</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;margin:0;padding:24px;background:#f8fafc;color:#0f172a}
    .card{max-width:860px;margin:0 auto;background:white;border:1px solid #e2e8f0;border-radius:18px;padding:20px;box-shadow:0 20px 60px rgba(15,23,42,.08)}
    button{border:0;border-radius:12px;background:#0f172a;color:white;padding:11px 16px;font-weight:800;cursor:pointer;margin-right:8px;margin-top:8px}
    pre{background:#0f172a;color:#e2e8f0;border-radius:14px;padding:16px;overflow:auto;white-space:pre-wrap}
    .ok{color:#16a34a;font-weight:900}.bad{color:#dc2626;font-weight:900}
  </style>
</head>
<body>
  <div class="card">
    <h1>Phase 38B.2 · Groq Frontend Integration</h1>
    <p>Dieser Test prüft, ob der Browser-Client geladen ist, die Worker-URL gesetzt ist und der Cloudflare Worker antwortet.</p>
    <button id="health">Health prüfen</button>
    <button id="coach">Coach-Test</button>
    <pre id="out">Bereit.</pre>
  </div>
  <script src="./data/language-ai-config.js"></script>
  <script src="./js/modules/language-ai-client.js"></script>
  <script>
    const out = document.getElementById('out');
    function print(x){ out.textContent = typeof x === 'string' ? x : JSON.stringify(x,null,2); }
    document.getElementById('health').onclick = async () => {
      try { print(await EGTLanguageAIClient.health()); }
      catch(e){ print({ok:false,error:e.message}); }
    };
    document.getElementById('coach').onclick = async () => {
      try { print(await EGTLanguageAIClient.coach({message:'Erkläre mir kurz den Unterschied zwischen weil und denn.', level:'B1', language:'Deutsch'})); }
      catch(e){ print({ok:false,error:e.message}); }
    };
    print({
      configLoaded: !!window.LanguageAcademyAIConfig,
      clientLoaded: !!window.EGTLanguageAIClient,
      enabled: window.EGTLanguageAIClient && EGTLanguageAIClient.isEnabled(),
      worker: window.LanguageAcademyAIConfig && LanguageAcademyAIConfig.workerBaseUrl
    });
  </script>
</body>
</html>
