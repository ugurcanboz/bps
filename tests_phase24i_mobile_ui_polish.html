<!doctype html><meta charset="utf-8"><title>Phase 24I Mobile UI Polish Test</title>
<body><pre id="out">running...</pre><script>
(function(){
 var out=document.getElementById('out');
 function pass(msg){out.textContent='PASS · '+msg;}
 function fail(msg){out.textContent='FAIL · '+msg; throw new Error(msg);}
 fetch('./css/language-course.css').then(r=>r.text()).then(css=>{
   var req=['Phase 24I · Mobile UI polish','touch-action:manipulation','max-width:390px','min-height:50px','data-ui-deep-sheet^="language-course"','prefers-reduced-motion'];
   var miss=req.filter(x=>css.indexOf(x)<0);
   if(miss.length) fail('missing css markers: '+miss.join(', '));
   return fetch('./docs_PHASE24I_MOBILE_UI_QA.md').then(r=>r.text());
 }).then(doc=>{
   var req=['iPhone SE','iPhone 16 Pro Max','iPad Air','Desktop','PASS'];
   var miss=req.filter(x=>doc.indexOf(x)<0);
   if(miss.length) fail('missing doc markers: '+miss.join(', '));
   pass('Mobile UI CSS and QA documentation markers present.');
 }).catch(e=>fail(e.message));
})();
</script></body>
