<!doctype html><html lang="de"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Phase 43V · Monster Visual QA Detector</title><body><pre id="out">Running…</pre><script>
(async function(){
  const out=document.getElementById('out');
  const checks=[];
  function ok(name,pass){checks.push({name,pass:!!pass});}
  const src=await fetch('./js/qa/egt-visual-state-capture.js?test='+Date.now()).then(r=>r.text());
  ok('Version G54.43.8F', src.includes("var VERSION = 'G54.43.8F'"));
  ok('collectVisualMonsterFindings vorhanden', src.includes('function collectVisualMonsterFindings'));
  ok('Strength/Weakness Collision Detector vorhanden', src.includes('detectStrengthWeaknessCollisions'));
  ok('Badge-Bar-Kollision erkannt', src.includes('strength_weakness_badge_bar_collision'));
  ok('Mobile two-line Hinweis vorhanden', src.includes('strength_weakness_mobile_needs_two_line_layout'));
  ok('Text Collision Detector vorhanden', src.includes('detectTextCollisions'));
  ok('Card Pressure Detector vorhanden', src.includes('detectCardPressure'));
  ok('Viewport Risk Zones Detector vorhanden', src.includes('detectViewportRiskZones'));
  ok('visualMonster im Capture enthalten', src.includes('visualMonster: collectVisualMonsterFindings()'));
  ok('visualFindings im Score enthalten', src.includes('visualFindings'));
  ok('Monster Visual QA Render Card vorhanden', src.includes('MONSTER VISUAL QA'));
  ok('DeepSheet Intelligence bleibt erhalten', src.includes('collectDeepSheetIntelligence'));
  const appCfg=await fetch('./js/core/app-config.js?test='+Date.now()).then(r=>r.text());
  ok('AppConfig G54.43.8F synchron', appCfg.includes("var VERSION = 'G54.43.8F'"));
  const failed=checks.filter(c=>!c.pass);
  out.textContent=(failed.length?'FAIL':'PASS')+' · '+(checks.length-failed.length)+'/'+checks.length+'\n'+checks.map(c=>(c.pass?'✅ ':'❌ ')+c.name).join('\n');
})();
</script></body></html>
