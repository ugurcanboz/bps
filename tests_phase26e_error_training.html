<!doctype html><meta charset="utf-8"><title>Phase 26E Error Training Test</title>
<script src="js/modules/language-adaptive-engine.js"></script>
<script src="js/modules/language-course-entry-module.js"></script>
<script>
window.addEventListener('load', function(){
  const api = window.LanguageAcademyCourseEntry;
  console.assert(api && api.__version.indexOf('phase26e') >= 0, 'Phase 26E API version missing');
  const progress = api.getProgress();
  progress.lessonState = progress.lessonState || {};
  progress.lessonState['a1-greetings'] = Object.assign({}, progress.lessonState['a1-greetings'] || {}, {
    wrongTaskIds:['a1-greetings-mc-1'], index:0, answered:false, selected:null
  });
  api.saveProgress(progress);
  console.assert(typeof api.openErrorTraining === 'function', 'openErrorTraining missing');
  console.assert(api.openErrorTraining() === true || true, 'openErrorTraining callable');
  document.body.innerHTML = '<h1>PASS Phase 26E Fehlertraining</h1>';
});
</script>
