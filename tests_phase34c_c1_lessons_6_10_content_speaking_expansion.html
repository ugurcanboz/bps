<!doctype html>
<html lang="de">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Phase 34C C1 QA</title>
<style>body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;margin:24px;background:#f7f7fb;color:#111}.card{background:white;border:1px solid #ddd;border-radius:14px;padding:16px;margin:12px 0}.ok{color:#067a22}.bad{color:#b00020}pre{white-space:pre-wrap;background:#111;color:#eee;padding:12px;border-radius:10px;overflow:auto}</style></head>
<body>
<h1>Phase 34C – C1 Lektionen 6–10 Content + Speaking Expansion</h1>
<div id="out" class="card">Lade Test...</div>
<script src="js/modules/language-course-entry-module.js"></script>
<script>
(function(){
  var out=document.getElementById('out');
  try{
    var api=window.LanguageAcademyCourseEntry;
    var snap=api && api.c1ContentSnapshot ? api.c1ContentSnapshot() : null;
    var errors=[];
    if(!snap) errors.push('Snapshot fehlt');
    if(snap){
      if(!snap.ok) errors.push('snap.ok ist false');
      if(snap.phase!=='34C') errors.push('Phase ist nicht 34C');
      if(snap.lessons!==10) errors.push('Lektionen nicht 10');
      if(snap.expandedLessons!==10) errors.push('Ausgebaute Lektionen nicht 10');
      if(snap.starterLessons!==0) errors.push('Starter-Lektionen nicht 0');
      if(snap.totalTasks!==430) errors.push('Aufgaben nicht 430');
      if(snap.normalTasks!==350) errors.push('Normalaufgaben nicht 350');
      if(snap.speakingTasks!==80) errors.push('Speaking nicht 80');
      Object.keys(snap.perLesson||{}).forEach(function(id){var r=snap.perLesson[id]; if(!r.ok||r.tasks!==43||r.speakingTasks!==8) errors.push(id+' fehlerhaft: '+JSON.stringify(r));});
    }
    out.innerHTML='<h2 class="'+(errors.length?'bad':'ok')+'">'+(errors.length?'FAIL':'PASS')+'</h2>'+(errors.length?'<ul>'+errors.map(function(e){return '<li>'+e+'</li>';}).join('')+'</ul>':'<p>C1 Phase 34C ist vollständig ausgebaut.</p>')+'<pre>'+JSON.stringify(snap,null,2)+'</pre>';
  }catch(e){out.innerHTML='<h2 class="bad">ERROR</h2><pre>'+String(e&&e.stack||e)+'</pre>';}
})();
</script>
</body></html>
