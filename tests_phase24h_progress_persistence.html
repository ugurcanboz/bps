<!doctype html><html lang="de"><head><meta charset="utf-8"><title>Phase 24H Progress Persistence Test</title></head><body>
<h1>Phase 24H – Progress Persistence</h1>
<pre id="out">running...</pre>
<script>
(function(){
  const results=[];
  function ok(name, pass){ results.push({name, pass:!!pass}); }
  window.AppModuleHost={_mods:[],register(m){this._mods.push(m); return true;},listModules(){return this._mods;}};
  window.EGTUILayer={last:null,openDeepSheet(cfg){this.last=cfg; const wrap=document.createElement('div'); wrap.innerHTML=cfg.bodyHtml||''; document.body.appendChild(wrap); return true;}};
  window.LanguageAcademyHelpSystem={getHint(input){return input && input.hint && (input.hint.tr||input.hint.de) || '';}};
  window.LanguageAcademyLanguageStore={get(){return {learningLanguage:'de',helpLanguage:'tr'};}};
})();
</script>
<script src="./js/modules/language-course-entry-module.js"></script>
<script>
(function(){
  const out=document.getElementById('out');
  const results=[];
  function ok(name, pass){ results.push({name, pass:!!pass}); }
  localStorage.removeItem('language_academy_course_progress_v2');
  localStorage.removeItem('language_academy_course_progress_v1');
  ok('API vorhanden', !!window.LanguageAcademyCourseEntry);
  ok('Phase 24H Diagnose', window.LanguageAcademyCourseEntry.diagnostics().phase === '24H');
  window.LanguageAcademyCourseEntry.openTask('a1','a1-greetings',0);
  let p=window.LanguageAcademyCourseEntry.getProgress();
  ok('Progress-Schema v2 vorhanden', p.schema === 'language-course-progress-v2');
  window.LanguageAcademyCourseEntry.saveProgress({currentCourse:{course:'Deutsch',level:'A1',lesson:'Begrüßungen',lessonId:'a1-greetings',progress:50,started:true,lastAction:'Test'}, lessonProgress:{'a1-greetings':50}, stats:{lastActivity:new Date().toISOString()}});
  p=window.LanguageAcademyCourseEntry.getProgress();
  ok('CurrentCourse speichert lessonId', p.currentCourse.lessonId === 'a1-greetings');
  ok('Lektionsfortschritt speichert Prozent', p.lessonProgress['a1-greetings'] === 50);
  ok('Legacy-Key wird mitgeschrieben', !!localStorage.getItem('language_academy_course_progress_v1'));
  ok('v2-Key wird geschrieben', !!localStorage.getItem('language_academy_course_progress_v2'));
  const failed=results.filter(r=>!r.pass);
  out.textContent=results.map(r=>(r.pass?'PASS ':'FAIL ')+r.name).join('\n') + '\n\n' + (failed.length?'FAILED':'ALL PASS');
  document.body.dataset.phase24h=failed.length?'fail':'pass';
})();
</script>
</body></html>
