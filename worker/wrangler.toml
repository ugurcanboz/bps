name = "assessments"
main = "src/index.js"
compatibility_date = "2026-07-01"
workers_dev = true

[vars]
APP_ENV = "development"
GROQ_MODEL = "llama-3.3-70b-versatile"
ALLOWED_ORIGINS = "http://localhost:8080,http://127.0.0.1:8080"
RATE_LIMIT_WINDOW_SECONDS = "60"
RATE_LIMIT_MAX_REQUESTS = "60"
MAX_BODY_BYTES = "24576"
MAX_INPUT_CHARS = "4000"


[env.beta]
name = "assessments-beta"
[env.beta.vars]
APP_ENV = "beta"
GROQ_MODEL = "llama-3.3-70b-versatile"
ALLOWED_ORIGINS = "https://beta.assessments-trainer.de"
RATE_LIMIT_WINDOW_SECONDS = "60"
RATE_LIMIT_MAX_REQUESTS = "35"
MAX_BODY_BYTES = "24576"
MAX_INPUT_CHARS = "4000"
ALLOW_ORIGINLESS_REQUESTS = "false"

[env.production]
name = "assessments"
[env.production.vars]
APP_ENV = "production"
GROQ_MODEL = "llama-3.3-70b-versatile"
ALLOWED_ORIGINS = "https://ugurcan-boz.github.io,https://assessments-trainer.de,https://www.assessments-trainer.de"
RATE_LIMIT_WINDOW_SECONDS = "60"
RATE_LIMIT_MAX_REQUESTS = "30"
MAX_BODY_BYTES = "24576"
MAX_INPUT_CHARS = "4000"
ALLOW_ORIGINLESS_REQUESTS = "false"

# Secrets je Umgebung setzen: wrangler secret put GROQ_API_KEY --env production
# KV- und Rate-Limit-Bindings nach Erstellung je Umgebung ergänzen.
