<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Phase 38B.3A – Speaking AI Client Test</title>
  <style>
    body{font-family:Arial,sans-serif;margin:24px;background:#f8fafc;color:#0f172a}
    .card{max-width:900px;margin:auto;background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:20px;box-shadow:0 12px 30px rgba(15,23,42,.08)}
    label{font-weight:700;display:block;margin-top:12px} input,select,textarea{width:100%;box-sizing:border-box;border:1px solid #cbd5e1;border-radius:12px;padding:10px;margin-top:6px;font:inherit} textarea{min-height:120px} button{margin-top:14px;border:0;border-radius:14px;background:#0f172a;color:white;padding:12px 16px;font-weight:800} pre{white-space:pre-wrap;background:#0f172a;color:#e2e8f0;border-radius:14px;padding:14px;overflow:auto}
  </style>
</head>
<body>
  <div class="card">
    <h1>Phase 38B.3A – Speaking AI Client Test</h1>
    <p>Testet <code>window.LanguageSpeakingAI</code> über Cloudflare Worker → Groq. Bei Ausfall erscheint ein lokaler Fallback.</p>
    <label>Niveau<select id="level"><option>A1</option><option>A2</option><option selected>B1</option><option>B2</option><option>C1</option><option>C2</option></select></label>
    <label>Thema<input id="topic" value="Arzttermin verschieben"></label>
    <label>Antwort<textarea id="userText">Guten Tag, ich möchte meinen Termin verschieben, weil ich morgen arbeiten muss. Haben Sie am Freitag einen freien Termin?</textarea></label>
    <button id="speakingBtn">Sprechtraining testen</button>
    <button id="examBtn">Prüfungsbewertung testen</button>
    <pre id="out">Bereit.</pre>
  </div>

  <script src="./data/language-ai-config.js"></script>
  <script src="./js/modules/language-ai-client.js"></script>
  <script src="./js/modules/language-speaking-ai-client.js"></script>
  <script>
    const out = document.getElementById('out');
    function payload(){
      return {
        level: document.getElementById('level').value,
        topic: document.getElementById('topic').value,
        userText: document.getElementById('userText').value,
        requiredPoints: ['höfliche Begrüßung','Termin verschieben','Grund nennen','neuen Termin vorschlagen']
      };
    }
    document.getElementById('speakingBtn').addEventListener('click', async () => {
      out.textContent = 'Sprechtraining läuft...';
      try{ out.textContent = JSON.stringify(await window.LanguageSpeakingAI.checkSpeaking(payload()), null, 2); }
      catch(e){ out.textContent = 'Fehler: ' + e.message; }
    });
    document.getElementById('examBtn').addEventListener('click', async () => {
      out.textContent = 'Prüfungsbewertung läuft...';
      try{ out.textContent = JSON.stringify(await window.LanguageSpeakingAI.checkExamSpeaking(payload()), null, 2); }
      catch(e){ out.textContent = 'Fehler: ' + e.message; }
    });
  </script>
</body>
</html>
