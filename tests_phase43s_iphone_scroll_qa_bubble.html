  add('scroll_guard_version', window.EGTIPhoneScrollHotfix && window.EGTIPhoneScrollHotfix.version==='G54.43.8B', 'Version G54.43.8B');
  window.__PHASE43S_RESULT__=result;
  if(result.checks.some(c=>c.status==='FAIL')) throw new Error('G54.43.8B static browser API test failed');
})();
