<!doctype html>
<html lang="de">
<head><meta charset="utf-8"><title>Phase 43F · Analyse Dashboard V2 Shell QA</title></head>
<body>
<pre id="out">running…</pre>
<script>
(async function(){
  const checks = [
    ['G54.42.8 version', async txt => txt.includes('G54.42.8')],
    ['Analyse Dashboard V2 marker', async txt => txt.includes('data-analysis-dashboard-v2="G54.42.8"')],
    ['Bereich dropdown', async txt => txt.includes('id="analysisV2Area"') && txt.includes('Alle Bereiche') && txt.includes('IT/FISI')],
    ['Zeitraum dropdown', async txt => txt.includes('id="analysisV2Period"') && txt.includes('30 Tage')],
    ['Ansicht dropdown', async txt => txt.includes('id="analysisV2View"') && txt.includes('Stärken & Schwächen')],
    ['KPI shell', async txt => txt.includes('analysis-v2-kpis') && txt.includes('analysis-v2-kpi')],
    ['Line chart shell', async txt => txt.includes('analysisV2LineSvg') && txt.includes('analysis-v2-line')],
    ['Bars shell', async txt => txt.includes('analysisV2BarsHtml') && txt.includes('analysis-v2-bar-row')],
    ['Coach shell', async txt => txt.includes('analysis-v2-coach') && txt.includes('Coach-Auswertung')],
    ['CSS loaded', async txt => (await fetch('./css/phase39i-pixel-polish.css').then(r=>r.text())).includes('Analyse Dashboard V2 Grundstruktur' || 'Analyse Data Adapter')]
  ];
  const txt = await fetch('./js/ui-home-renderer.js').then(r=>r.text());
  const results = [];
  for (const [name, fn] of checks) {
    let ok=false, err='';
    try { ok=!!(await fn(txt)); } catch(e){ err=e.message||String(e); }
    results.push({name, ok, err});
  }
  document.getElementById('out').textContent = JSON.stringify({phase:'43F', passed:results.every(r=>r.ok), results}, null, 2);
})();
</script>
</body></html>
