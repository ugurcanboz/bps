<!doctype html>
<html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Phase 43B · Admin iPhone Portrait Hotfix QA</title>
<style>body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#020617;color:#e5e7eb;margin:0;padding:24px;line-height:1.5}main{max-width:980px;margin:auto;background:rgba(15,23,42,.94);border:1px solid rgba(148,163,184,.25);border-radius:24px;padding:24px}.ok{color:#86efac}.bad{color:#fca5a5}.row{padding:10px 0;border-top:1px solid rgba(148,163,184,.18)}code{background:#111827;padding:2px 6px;border-radius:6px}</style></head>
<body><main><h1>Phase 43B · Admin iPhone Portrait Hotfix QA</h1><p>Minimaler Hotfix für Adminportal: iPhone Hochformat Tabs + natives Scrollen.</p><div id="result">Prüfung läuft …</div></main>
<script>
(async function(){
 const out=document.getElementById('result'); const checks=[]; const add=(n,o,d='')=>checks.push({n,o:!!o,d});
 async function text(u){const r=await fetch(u,{cache:'no-store'});return r.ok?r.text():''} async function json(u){try{return JSON.parse(await text(u))}catch(e){return null}}
 const css=await text('css/admin-portal.css'), ui=await text('js/ui-router.js'), app=await text('js/core/app-config.js'), sw=await text('service-worker.js'), m=await json('manifest.json'), u=await json('update-check.json');
 add('iPhone-Hochformat Media Query vorhanden', css.includes('@media (max-width: 560px) and (orientation: portrait)'));
 add('Tabgruppe kann nicht mehr in sich schrumpfen', css.includes('min-width: max-content') && css.includes('.egt-portal-tab-group'));
 add('Logout-Tab überlappt nicht mehr per Auto-Margin', css.includes('.egt-portal-tabbar .egt-logout-tab') && css.includes('margin-left: 0 !important'));
 add('Admin Modal erlaubt natives iOS-Scrolling', css.includes('overflow-y: scroll !important') && css.includes('-webkit-overflow-scrolling: touch'));
 add('Layer Body blockiert iOS-Pan nicht mehr hart', ui.includes("document.body.style.touchAction='pan-y';"));
 add('Version G54.42.2', app.includes("var VERSION = 'G54.42.2'"));
 add('Manifest G54.42.2', m && m.version==='G54.42.2', m&&m.version);
 add('Update-Check G54.42.2', u && String(u.version||'').startsWith('G54.42.2'), u&&u.version);
 add('Service Worker Cache G54.42.2', sw.includes('egt-trainer-g54-42-2'));
 const passed=checks.every(c=>c.o); out.innerHTML='<h2 class="'+(passed?'ok':'bad')+'">'+(passed?'PASSED':'FAILED')+'</h2>'+checks.map(c=>'<div class="row"><strong class="'+(c.o?'ok':'bad')+'">'+(c.o?'✓':'✗')+'</strong> '+c.n+(c.d?' <code>'+String(c.d).replace(/[&<>]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[s]))+'</code>':'')+'</div>').join('');
})();
</script></body></html>
