<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Phase 38C.2 – Exam Shell Test</title>
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/language-course.css">
  <style>
    body{font-family:Arial,sans-serif;background:#f8fafc;color:#0f172a;margin:0;padding:20px}.box{max-width:980px;margin:0 auto;background:#fff;border-radius:18px;padding:20px;box-shadow:0 10px 35px rgba(15,23,42,.08)}pre{white-space:pre-wrap;background:#0f172a;color:#e2e8f0;padding:14px;border-radius:14px}.ok{color:#166534}.bad{color:#991b1b}button{margin:5px;padding:10px 14px;border-radius:12px;border:1px solid #cbd5e1;background:#fff;font-weight:700}.primary{background:#2563eb;color:#fff;border-color:#2563eb}
  </style>
</head>
<body>
  <div class="box">
    <h1>Phase 38C.2 – Exam Shell Test</h1>
    <p>Dieser Test prüft, ob die sichtbare Prüfungssimulation geladen ist.</p>
    <button class="primary" id="run">Diagnose starten</button>
    <button id="startB1">B1 Session starten</button>
    <button id="clear">Session löschen</button>
    <pre id="out">Bereit.</pre>
  </div>

  <script src="data/language-ai-config.js"></script>
  <script src="js/modules/language-speaking-ai-client.js"></script>
  <script src="data/language-exam-blueprints.js"></script>
  <script src="js/modules/language-exam-engine.js"></script>
  <script src="js/modules/language-exam-shell.js"></script>
  <script>
    const out = document.getElementById('out');
    function write(x){ out.textContent = typeof x === 'string' ? x : JSON.stringify(x,null,2); }
    document.getElementById('run').addEventListener('click', () => {
      const report = {
        blueprintsLoaded: !!window.LanguageExamBlueprints,
        engineLoaded: !!window.LanguageExamEngine,
        shellLoaded: !!window.LanguageExamShell,
        shellDiagnostics: window.LanguageExamShell && window.LanguageExamShell.diagnostics ? window.LanguageExamShell.diagnostics() : null,
        b1Blueprint: window.LanguageExamBlueprints && window.LanguageExamBlueprints.get ? window.LanguageExamBlueprints.get('B1') : null
      };
      write(report);
    });
    document.getElementById('startB1').addEventListener('click', () => {
      if(window.LanguageExamShell && window.LanguageExamShell.start){
        window.LanguageExamShell.start('B1');
        write(window.LanguageExamShell.loadSession());
      } else write('LanguageExamShell fehlt.');
    });
    document.getElementById('clear').addEventListener('click', () => {
      if(window.LanguageExamShell && window.LanguageExamShell.clearSession) window.LanguageExamShell.clearSession();
      write('Session gelöscht.');
    });
  </script>
</body>
</html>
