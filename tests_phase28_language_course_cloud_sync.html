<!doctype html><html lang="de"><head><meta charset="utf-8"><title>Phase 28 Cloud Sync QA</title></head><body>
<pre id="out">Phase 28 Test läuft…</pre>
<script src="./js/modules/language-adaptive-engine.js"></script>
<script src="./js/modules/language-course-entry-module.js"></script>
<script src="./js/modules/language-course-cloud-sync.js"></script>
<script>
(function(){
  var lines=[]; function ok(label,cond){lines.push((cond?'✅ ':'❌ ')+label); if(!cond) throw new Error(label);}
  ok('CloudSync API vorhanden', !!window.LanguageCourseCloudSync);
  ok('CourseEntry API vorhanden', !!window.LanguageAcademyCourseEntry);
  ok('Diagnostics Phase 28', window.LanguageAcademyCourseEntry.diagnostics().phase==='28');
  var p=window.LanguageAcademyCourseEntry.getProgress();
  p.currentCourse={course:'Deutsch',level:'A1',lesson:'Begrüßungen',lessonId:'a1-greetings',progress:22,started:true,lastAction:'Phase28 Test'};
  window.LanguageAcademyCourseEntry.saveProgress(p);
  setTimeout(function(){
    var st=window.LanguageCourseCloudSync.status();
    ok('Status abrufbar', !!st && typeof st==='object');
    ok('Provider gesetzt', !!st.provider);
    ok('Lokaler Mirror/Status vorbereitet', window.LanguageCourseCloudSync.diagnostics().hasLocalMirror || st.mode==='queued' || st.mode==='local-mirror' || st.mode==='local-first-cloud-ready');
    ok('Sync-Methoden vorhanden', typeof window.LanguageAcademyCourseEntry.syncPush==='function' && typeof window.LanguageAcademyCourseEntry.syncPull==='function');
    document.getElementById('out').textContent=lines.join('\n')+'\n\nPASS';
  },80);
})();
</script></body></html>
